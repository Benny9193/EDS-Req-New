<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - EDS Universal Requisition</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        [x-cloak] { display: none !important; }

        :root {
            --color-primary: #1c1a83;
            --color-secondary: #4a4890;
            --color-accent: #b70c0d;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 50%, #6c63ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            margin-bottom: 1rem;
        }

        .logo-icon i {
            font-size: 2rem;
            color: var(--color-primary);
        }

        .logo-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .logo-subtitle {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
        }

        .login-card h2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #1f2937;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.375rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 0.875rem;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 0.75rem 0.75rem 2.5rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-family: inherit;
            color: #1f2937;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(28, 26, 131, 0.1);
        }

        .form-input.error {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(183, 12, 13, 0.1);
        }

        .form-input.uppercase {
            text-transform: uppercase;
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0.25rem;
            font-size: 0.875rem;
        }

        .password-toggle:hover {
            color: #6b7280;
        }

        .error-text {
            font-size: 0.75rem;
            color: var(--color-accent);
            margin-top: 0.25rem;
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: var(--color-secondary);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .fa-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="login-container" x-data="loginForm()" x-cloak>
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <div class="logo-title">Educational Data Services</div>
            <div class="logo-subtitle">Universal Requisition System</div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h2>Sign In</h2>

            <!-- Error -->
            <div x-show="errorMessage" x-transition class="alert-error" role="alert">
                <i class="fas fa-exclamation-circle"></i>
                <span x-text="errorMessage"></span>
            </div>

            <form @submit.prevent="login()">
                <!-- District Code -->
                <div class="form-group">
                    <label for="login-district" class="form-label">District Code</label>
                    <div class="input-wrapper">
                        <i class="fas fa-building icon"></i>
                        <input type="text"
                               id="login-district"
                               x-model="districtCode"
                               maxlength="4"
                               placeholder="Enter district code"
                               class="form-input uppercase"
                               :class="{ 'error': errors.districtCode }"
                               @input="districtCode = districtCode.toUpperCase(); errors.districtCode = ''"
                               autocomplete="username">
                    </div>
                    <div x-show="errors.districtCode" class="error-text" x-text="errors.districtCode"></div>
                </div>

                <!-- User Number -->
                <div class="form-group">
                    <label for="login-user" class="form-label">User Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user icon"></i>
                        <input type="text"
                               id="login-user"
                               x-model="userNumber"
                               placeholder="Enter user number"
                               class="form-input"
                               :class="{ 'error': errors.userNumber }"
                               @input="errors.userNumber = ''"
                               autocomplete="username">
                    </div>
                    <div x-show="errors.userNumber" class="error-text" x-text="errors.userNumber"></div>
                </div>

                <!-- Password -->
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="login-password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock icon"></i>
                        <input :type="showPassword ? 'text' : 'password'"
                               id="login-password"
                               x-model="password"
                               placeholder="Enter password"
                               class="form-input"
                               style="padding-right: 2.5rem;"
                               :class="{ 'error': errors.password }"
                               @input="errors.password = ''"
                               autocomplete="current-password">
                        <button type="button"
                                @click="showPassword = !showPassword"
                                class="password-toggle"
                                :aria-label="showPassword ? 'Hide password' : 'Show password'">
                            <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                        </button>
                    </div>
                    <div x-show="errors.password" class="error-text" x-text="errors.password"></div>
                </div>

                <button type="submit" :disabled="isLoading" class="btn-login">
                    <i x-show="isLoading" class="fas fa-spinner fa-spin"></i>
                    <span x-text="isLoading ? 'Signing in...' : 'Sign In'"></span>
                </button>
            </form>
        </div>

        <div class="footer">&copy; 2026 Educational Data Services, Inc.</div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
