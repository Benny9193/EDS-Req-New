<!-- ===== Cart Drawer ===== -->
<div class="overlay" :class="{ active: cartOpen }" @click="cartOpen = false"></div>
<div class="cart-drawer" role="dialog" aria-modal="true" aria-label="Shopping cart" :class="{ open: cartOpen }" x-trap.noscroll="cartOpen" @keydown.escape.window="cartOpen = false">
    <div class="cart-drawer-header">
        <h3 style="font-size: var(--text-lg); font-weight: var(--font-bold);">
            Cart <span style="color: var(--text-muted); font-weight: var(--font-normal);" x-text="'(' + cartCount + ')'"></span>
        </h3>
        <button class="btn btn-ghost btn-icon btn-sm" @click="cartOpen = false">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <div class="cart-drawer-body">
        <template x-if="cart.length === 0">
            <div class="empty-state" style="padding: var(--space-8) 0;">
                <div class="empty-state-icon"><i class="fas fa-shopping-cart"></i></div>
                <div class="empty-state-title">Cart is empty</div>
                <p>Add products to get started</p>
            </div>
        </template>
        <template x-for="(item, idx) in cart" :key="item.ItemNumber || item.item_number || idx">
            <div class="cart-item">
                <div class="cart-item-image">
                    <i class="fas fa-box" style="color: var(--color-neutral-300);"></i>
                </div>
                <div class="cart-item-info">
                    <div style="font-size: var(--text-sm); font-weight: var(--font-semibold);" class="truncate" x-text="item.Description || item.description || item.name || 'Item'"></div>
                    <div style="font-size: var(--text-xs); color: var(--text-muted);" x-text="item.VendorName || item.vendor_name || ''"></div>
                    <div class="flex items-center gap-2 mt-2">
                        <button class="btn btn-ghost btn-icon btn-sm" style="width:24px;height:24px;font-size:var(--text-xs);" @click="updateCartQty(idx, -1)">
                            <i class="fas fa-minus"></i>
                        </button>
                        <span style="font-size: var(--text-sm); font-weight: var(--font-semibold); min-width: 20px; text-align: center;" x-text="item.quantity || 1"></span>
                        <button class="btn btn-ghost btn-icon btn-sm" style="width:24px;height:24px;font-size:var(--text-xs);" @click="updateCartQty(idx, 1)">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="btn btn-ghost btn-icon btn-sm" style="width:24px;height:24px;font-size:var(--text-xs);color:var(--color-danger-500);margin-left:auto;" @click="removeFromCart(idx)">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                <div style="font-weight: var(--font-bold); color: var(--color-primary-500); white-space: nowrap;" x-text="formatPrice((item.Price || item.price || item.UnitPrice || 0) * (item.quantity || 1))"></div>
            </div>
        </template>
    </div>
    <div class="cart-drawer-footer" x-show="cart.length > 0">
        <!-- Budget warning banner -->
        <template x-if="cartBudgetWarningLevel() !== 'none' && budgetRemaining() !== null">
            <div style="padding: var(--space-3); border-radius: var(--radius-lg); margin-bottom: var(--space-3); font-size: var(--text-sm); display: flex; align-items: flex-start; gap: var(--space-2);"
                 :style="cartBudgetWarningLevel() === 'over'
                    ? 'background: var(--color-accent-50); border: 1px solid var(--color-accent-200); color: var(--color-accent-700);'
                    : cartBudgetWarningLevel() === 'critical'
                        ? 'background: var(--color-warning-50); border: 1px solid var(--color-warning-200); color: var(--color-warning-700);'
                        : 'background: var(--color-warning-50); border: 1px solid var(--color-warning-100); color: var(--color-warning-600);'">
                <i class="fas" :class="cartBudgetWarningLevel() === 'over' ? 'fa-exclamation-circle' : 'fa-exclamation-triangle'" style="margin-top: 2px;"></i>
                <div>
                    <template x-if="cartBudgetWarningLevel() === 'over'">
                        <span><strong>Over budget</strong> — your cart is <strong x-text="formatPrice(cartTotal - budgetRemaining())"></strong> over your remaining <strong x-text="formatPrice(budgetRemaining())"></strong> budget.</span>
                    </template>
                    <template x-if="cartBudgetWarningLevel() === 'critical'">
                        <span>Cart is <strong x-text="cartBudgetPercent() + '%'"></strong> of your remaining budget.</span>
                    </template>
                    <template x-if="cartBudgetWarningLevel() === 'warning'">
                        <span>Cart is <strong x-text="cartBudgetPercent() + '%'"></strong> of your remaining budget.</span>
                    </template>
                </div>
            </div>
        </template>
        <div class="flex justify-between items-center mb-4">
            <span style="font-weight: var(--font-semibold);">Subtotal</span>
            <span style="font-size: var(--text-xl); font-weight: var(--font-bold);"
                  :style="cartOverBudget() ? 'color: var(--color-accent-500);' : 'color: var(--color-primary-500);'"
                  x-text="formatPrice(cartTotal)"></span>
        </div>
        <!-- Budget remaining context line -->
        <template x-if="budgetRemaining() !== null">
            <div class="flex justify-between items-center" style="margin-bottom: var(--space-3); font-size: var(--text-xs); color: var(--text-muted);">
                <span>Remaining budget</span>
                <span x-text="formatPrice(budgetRemaining())"></span>
            </div>
        </template>
        <div class="flex gap-2">
            <button class="btn btn-ghost w-full" @click="showSaveListFromCart()">
                <i class="fas fa-bookmark"></i> Save List
            </button>
            <a href="checkout.html" class="btn btn-primary w-full" style="text-decoration:none;">
                <i class="fas fa-arrow-right"></i> Checkout
            </a>
        </div>
    </div>
</div>

<!-- ===== Toast Notifications (stacking) ===== -->
<div style="position:fixed; top:1.25rem; right:1.25rem; z-index:10000; display:flex; flex-direction:column; gap:0.5rem; pointer-events:none;">
    <template x-for="toast in toasts" :key="toast.id">
        <div x-show="toast.visible"
             x-transition:enter.duration.300ms
             x-transition:leave.duration.200ms
             style="display:flex; align-items:center; gap:0.625rem; padding:0.875rem 1.25rem; background:#fff; border-radius:0.75rem; box-shadow: 0 8px 32px rgba(0,0,0,0.18); border-left: 4px solid var(--eds-primary); min-width:280px; max-width:420px; font-size:0.9rem; pointer-events:auto;">
            <i :class="toast.icon || 'fas fa-check-circle'" :style="'color:' + (toast.color || 'var(--color-success-500)') + '; font-size:1.1rem;'"></i>
            <span x-text="toast.message" style="flex:1; color:var(--color-gray-800);"></span>
            <button @click="dismissToast(toast.id)" style="background:none; border:none; cursor:pointer; opacity:0.4; padding:0 0.25rem; font-size:0.85rem; color:var(--color-gray-600);">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </template>
</div>

<!-- ===== Save List Dialog ===== -->
<template x-if="showSaveListDialog">
    <div @keydown.escape.window="showSaveListDialog = false">
        <div class="overlay active" @click="showSaveListDialog = false"></div>
        <div role="dialog" aria-modal="true" aria-labelledby="savelist-dialog-title" x-trap="showSaveListDialog" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:var(--z-modal);background:var(--bg-card);border-radius:var(--radius-xl);padding:var(--space-6);box-shadow:var(--shadow-xl);min-width:360px;">
            <h3 id="savelist-dialog-title" style="font-size: var(--text-lg); font-weight: var(--font-bold); margin-bottom: var(--space-4);">Save as List</h3>
            <input type="text" class="input mb-4" placeholder="List name..." x-model="newListName" @keydown.enter="saveCurrentList()">
            <div class="flex gap-2 justify-between">
                <button class="btn btn-ghost" @click="showSaveListDialog = false">Cancel</button>
                <button class="btn btn-primary" @click="saveCurrentList()">Save List</button>
            </div>
        </div>
    </div>
</template>

<!-- ===== Save Cart as Template Dialog ===== -->
<template x-if="showSaveTemplateDialog">
    <div @keydown.escape.window="showSaveTemplateDialog = false">
        <div class="overlay active" @click="showSaveTemplateDialog = false"></div>
        <div role="dialog" aria-modal="true" x-trap="showSaveTemplateDialog" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:var(--z-modal);background:var(--bg-card);border-radius:var(--radius-xl);padding:var(--space-6);box-shadow:var(--shadow-xl);min-width:400px;max-width:480px;">
            <h3 style="font-size: var(--text-lg); font-weight: var(--font-bold); margin-bottom: var(--space-4);">Save Cart as Template</h3>
            <p style="font-size:var(--text-sm); color:var(--text-secondary); margin-bottom:var(--space-4);" x-text="cart.length + ' item(s) will be saved to this template.'"></p>
            <label style="font-size:var(--text-xs); font-weight:var(--font-semibold); color:var(--text-secondary); display:block; margin-bottom:var(--space-1);">Template Name *</label>
            <input type="text" class="input mb-4" placeholder="e.g. My Classroom Supplies" x-model="newTemplateName" @keydown.enter="saveCartAsTemplate()">
            <label style="font-size:var(--text-xs); font-weight:var(--font-semibold); color:var(--text-secondary); display:block; margin-bottom:var(--space-1);">Category</label>
            <select class="input mb-4" x-model="newTemplateCategory">
                <option value="Custom">Custom</option>
                <option value="Classroom">Classroom</option>
                <option value="Office">Office</option>
                <option value="Art & Music">Art & Music</option>
                <option value="Athletics">Athletics</option>
                <option value="Technology">Technology</option>
            </select>
            <label style="font-size:var(--text-xs); font-weight:var(--font-semibold); color:var(--text-secondary); display:block; margin-bottom:var(--space-1);">Description (optional)</label>
            <input type="text" class="input mb-4" placeholder="Brief description..." x-model="newTemplateDescription">
            <div class="flex gap-2 justify-between">
                <button class="btn btn-ghost" @click="showSaveTemplateDialog = false">Cancel</button>
                <button class="btn btn-primary" @click="saveCartAsTemplate()" :disabled="!newTemplateName.trim()">
                    <i class="fas fa-save" style="margin-right:var(--space-1);"></i> Save Template
                </button>
            </div>
        </div>
    </div>
</template>

<!-- ===== Product Detail Modal ===== -->
<template x-if="showProductModal && selectedProduct">
    <div style="position:fixed;inset:0;z-index:var(--z-overlay);" @keydown.escape.window="showProductModal = false">
        <div class="overlay active" @click="showProductModal = false"></div>
        <div role="dialog" aria-modal="true" aria-labelledby="product-modal-title" x-trap="showProductModal" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:var(--z-modal);background:var(--bg-card);border-radius:var(--radius-xl);box-shadow:var(--shadow-xl);width:90%;max-width:600px;max-height:85vh;overflow-y:auto;">
            <!-- Modal header -->
            <div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--border-light);">
                <h2 id="product-modal-title" style="font-size:var(--text-lg);font-weight:var(--font-bold);margin:0;">Product Details</h2>
                <button class="btn btn-ghost btn-icon btn-sm" @click="showProductModal = false"><i class="fas fa-times"></i></button>
            </div>
            <!-- Product hero -->
            <div style="display:flex;align-items:center;justify-content:center;padding:var(--space-8);background:var(--bg-subtle);">
                <i class="fas" :class="getCategoryIcon(selectedProduct)" :style="'font-size:4rem;color:' + getCategoryColor(selectedProduct)"></i>
            </div>
            <!-- Product info -->
            <div style="padding:var(--space-6);">
                <div style="font-size:var(--text-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:var(--space-1);" x-text="selectedProduct.VendorName || ''"></div>
                <h3 style="font-size:var(--text-xl);font-weight:var(--font-bold);margin-bottom:var(--space-2);line-height:1.3;" x-text="selectedProduct.Description || selectedProduct.description || selectedProduct.name || 'Product'"></h3>
                <div style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4);">
                    Item # <span x-text="selectedProduct.ItemNumber || selectedProduct.item_number || ''"></span>
                </div>

                <!-- Details grid -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin-bottom:var(--space-6);">
                    <div class="card" style="padding:var(--space-3);margin:0;">
                        <div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:2px;">Price</div>
                        <div style="font-size:var(--text-lg);font-weight:var(--font-bold);color:var(--color-primary-500);" x-text="formatPrice(selectedProduct.Price || selectedProduct.price || selectedProduct.UnitPrice)"></div>
                    </div>
                    <div class="card" style="padding:var(--space-3);margin:0;">
                        <div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:2px;">Unit</div>
                        <div style="font-weight:var(--font-semibold);" x-text="selectedProduct.UnitOfMeasure || selectedProduct.unit || 'Each'"></div>
                    </div>
                    <template x-if="selectedProduct.ManufacturerName || selectedProduct.manufacturer">
                        <div class="card" style="padding:var(--space-3);margin:0;">
                            <div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:2px;">Manufacturer</div>
                            <div style="font-weight:var(--font-semibold);" x-text="selectedProduct.ManufacturerName || selectedProduct.manufacturer"></div>
                        </div>
                    </template>
                    <template x-if="selectedProduct.ManufacturerPartNumber || selectedProduct.mfr_part">
                        <div class="card" style="padding:var(--space-3);margin:0;">
                            <div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:2px;">Mfr Part #</div>
                            <div style="font-weight:var(--font-semibold);" x-text="selectedProduct.ManufacturerPartNumber || selectedProduct.mfr_part"></div>
                        </div>
                    </template>
                    <template x-if="selectedProduct.CategoryDescription || selectedProduct.category">
                        <div class="card" style="padding:var(--space-3);margin:0;">
                            <div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:2px;">Category</div>
                            <div style="font-weight:var(--font-semibold);" x-text="selectedProduct.CategoryDescription || selectedProduct.category"></div>
                        </div>
                    </template>
                    <template x-if="selectedProduct.PackSize || selectedProduct.pack_size">
                        <div class="card" style="padding:var(--space-3);margin:0;">
                            <div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:2px;">Pack Size</div>
                            <div style="font-weight:var(--font-semibold);" x-text="selectedProduct.PackSize || selectedProduct.pack_size"></div>
                        </div>
                    </template>
                </div>

                <!-- Vendor info -->
                <template x-if="selectedProduct.VendorName">
                    <div style="background:var(--bg-subtle);border-radius:var(--radius-lg);padding:var(--space-4);margin-bottom:var(--space-6);">
                        <div style="font-size:var(--text-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:var(--space-2);">Supplier</div>
                        <div style="font-weight:var(--font-semibold);margin-bottom:var(--space-1);" x-text="selectedProduct.VendorName"></div>
                        <template x-if="selectedProduct.VendorNumber || selectedProduct.vendor_number">
                            <div style="font-size:var(--text-sm);color:var(--text-secondary);">Supplier # <span x-text="selectedProduct.VendorNumber || selectedProduct.vendor_number"></span></div>
                        </template>
                    </div>
                </template>

                <!-- Add to cart -->
                <div style="display:flex;gap:var(--space-3);">
                    <button class="btn btn-primary" style="flex:1;" @click="addToCart(selectedProduct); showProductModal = false;">
                        <i class="fas fa-cart-plus" style="margin-right:var(--space-2);"></i> Add to Cart
                    </button>
                    <button class="btn btn-ghost" @click="showProductModal = false">Close</button>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- ===== Order Detail Modal ===== -->
<template x-if="showOrderDetail && selectedOrder">
    <div x-trap="showOrderDetail" style="position:fixed;inset:0;z-index:var(--z-overlay);" @keydown.escape.window="showOrderDetail = false">
        <div class="overlay active" @click="showOrderDetail = false"></div>
        <div role="dialog" aria-modal="true" aria-labelledby="order-modal-title" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:var(--z-modal);background:var(--bg-card);border-radius:var(--radius-xl);box-shadow:var(--shadow-xl);width:92%;max-width:700px;max-height:85vh;overflow-y:auto;">
            <!-- Header -->
            <div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--border-light);">
                <div>
                    <h2 id="order-modal-title" style="font-size:var(--text-lg);font-weight:var(--font-bold);margin:0;" x-text="'Order ' + (selectedOrder.requisition_number || '#' + selectedOrder.requisition_id)"></h2>
                    <span class="badge" style="margin-top:var(--space-1);"
                          :class="{
                              'badge-success': selectedOrder.status === 'Approved' || selectedOrder.status === 'Fulfilled' || selectedOrder.status === 'PO Printed',
                              'badge-warning': selectedOrder.status === 'Submitted' || selectedOrder.status === 'Pending Approval' || selectedOrder.status === 'On Hold',
                              'badge-info': selectedOrder.status === 'Draft' || selectedOrder.status === 'At EDS',
                              'badge-accent': selectedOrder.status === 'Rejected' || selectedOrder.status === 'Cancelled'
                          }"
                          x-text="selectedOrder.status"></span>
                </div>
                <button class="btn btn-ghost btn-icon btn-sm" @click="showOrderDetail = false"><i class="fas fa-times"></i></button>
            </div>
            <!-- Order summary -->
            <div style="padding:var(--space-4) var(--space-6);background:var(--bg-subtle);display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4);">
                <div>
                    <div style="font-size:var(--text-xs);color:var(--text-muted);text-transform:uppercase;">Date</div>
                    <div style="font-weight:var(--font-semibold);" x-text="selectedOrder.created_at ? new Date(selectedOrder.created_at).toLocaleDateString() : '-'"></div>
                </div>
                <div>
                    <div style="font-size:var(--text-xs);color:var(--text-muted);text-transform:uppercase;">Items</div>
                    <div style="font-weight:var(--font-semibold);" x-text="selectedOrder.item_count || orderDetailItems.length || '-'"></div>
                </div>
                <div>
                    <div style="font-size:var(--text-xs);color:var(--text-muted);text-transform:uppercase;">Total</div>
                    <div style="font-weight:var(--font-bold);color:var(--eds-primary);" x-text="formatPrice(selectedOrder.total_amount || 0)"></div>
                </div>
            </div>
            <!-- Notes -->
            <template x-if="selectedOrder.notes_preview || selectedOrder.notes">
                <div style="padding:var(--space-3) var(--space-6);border-bottom:1px solid var(--border-light);font-size:var(--text-sm);color:var(--text-secondary);">
                    <i class="fas fa-sticky-note" style="margin-right:var(--space-2);"></i>
                    <span x-text="selectedOrder.notes_preview || selectedOrder.notes"></span>
                </div>
            </template>
            <!-- Line items -->
            <div style="padding:var(--space-4) var(--space-6);">
                <h3 style="font-size:var(--text-base);font-weight:var(--font-semibold);margin-bottom:var(--space-3);">Line Items</h3>
                <!-- Loading -->
                <template x-if="orderDetailLoading">
                    <div style="text-align:center;padding:var(--space-6);color:var(--text-muted);">
                        <i class="fas fa-spinner fa-spin"></i> Loading items...
                    </div>
                </template>
                <!-- Empty -->
                <template x-if="!orderDetailLoading && orderDetailItems.length === 0">
                    <div style="text-align:center;padding:var(--space-6);color:var(--text-muted);">
                        No line items found for this order.
                    </div>
                </template>
                <!-- Items table -->
                <template x-if="!orderDetailLoading && orderDetailItems.length > 0">
                    <div style="overflow-x:auto;">
                        <table class="data-table" style="font-size:var(--text-sm);">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th style="text-align:center;">Qty</th>
                                    <th style="text-align:right;">Unit Price</th>
                                    <th style="text-align:right;">Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="item in orderDetailItems" :key="item.line_id">
                                    <tr>
                                        <td>
                                            <div style="font-weight:var(--font-semibold);" x-text="item.product_name"></div>
                                            <div style="font-size:var(--text-xs);color:var(--text-muted);">
                                                <span x-show="item.vendor" x-text="item.vendor"></span>
                                                <span x-show="item.vendor && item.sku"> &middot; </span>
                                                <span x-show="item.sku" x-text="'SKU: ' + item.sku"></span>
                                            </div>
                                        </td>
                                        <td style="text-align:center;" x-text="item.quantity"></td>
                                        <td style="text-align:right;" x-text="formatPrice(item.unit_price)"></td>
                                        <td style="text-align:right;font-weight:var(--font-semibold);" x-text="formatPrice(item.extended_price)"></td>
                                    </tr>
                                </template>
                            </tbody>
                            <tfoot>
                                <tr style="border-top:2px solid var(--border-default);">
                                    <td colspan="3" style="text-align:right;font-weight:var(--font-bold);">Order Total</td>
                                    <td style="text-align:right;font-weight:var(--font-bold);color:var(--eds-primary);" x-text="formatPrice(orderDetailItems.reduce((s, i) => s + (i.extended_price || 0), 0) || selectedOrder.total_amount || 0)"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </template>
            </div>
            <!-- Footer -->
            <div style="padding:var(--space-4) var(--space-6);border-top:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;">
                <button class="btn btn-primary btn-sm" @click="reorderItems()" :disabled="orderDetailLoading || orderDetailItems.length === 0">
                    <i class="fas fa-redo" style="margin-right:var(--space-1);"></i> Reorder These Items
                </button>
                <button class="btn btn-ghost" @click="showOrderDetail = false">Close</button>
            </div>
        </div>
    </div>
</template>

<!-- ===== Demo Mode Switcher (only visible in demo) ===== -->
<template x-if="_getSessionId() === 'demo'">
    <div style="position:fixed;bottom:16px;right:16px;z-index:9999;" x-data="{ demoOpen: false }">
        <!-- Toggle button -->
        <button @click="demoOpen = !demoOpen"
                style="width:44px;height:44px;border-radius:50%;border:2px solid var(--color-primary-300);background:var(--color-primary-500);color:white;cursor:pointer;box-shadow:var(--shadow-lg);display:flex;align-items:center;justify-content:center;font-size:16px;transition:transform 0.15s;"
                :style="demoOpen && 'transform:rotate(45deg)'"
                title="Switch demo persona">
            <i class="fas fa-user-cog"></i>
        </button>
        <!-- Switcher panel -->
        <div x-show="demoOpen" x-transition.opacity.duration.150ms
             @click.outside="demoOpen = false"
             style="position:absolute;bottom:54px;right:0;background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-xl);padding:12px;min-width:220px;">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:8px;">Demo Persona</div>
            <button @click="$dispatch('demo-switch', 'approver'); demoOpen = false"
                    class="demo-persona-btn"
                    :class="{ 'demo-persona-active': isAdmin }"
                    style="display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:1px solid var(--border-light);border-radius:var(--radius-md);background:none;cursor:pointer;font-family:inherit;font-size:13px;margin-bottom:6px;transition:background 0.1s;"
                    onmouseover="this.style.background='var(--bg-muted)'" onmouseout="this.style.background=this.classList.contains('demo-persona-active')?'var(--color-primary-50)':'none'">
                <span style="width:28px;height:28px;border-radius:50%;background:var(--color-primary-100);color:var(--color-primary-600);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">
                    <i class="fas fa-user-shield"></i>
                </span>
                <div style="text-align:left;">
                    <div style="font-weight:600;line-height:1.2;">District Admin</div>
                    <div style="font-size:11px;color:var(--text-muted);">Approval Level 2</div>
                </div>
            </button>
            <button @click="$dispatch('demo-switch', 'teacher'); demoOpen = false"
                    class="demo-persona-btn"
                    :class="{ 'demo-persona-active': !isAdmin }"
                    style="display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:1px solid var(--border-light);border-radius:var(--radius-md);background:none;cursor:pointer;font-family:inherit;font-size:13px;transition:background 0.1s;"
                    onmouseover="this.style.background='var(--bg-muted)'" onmouseout="this.style.background=this.classList.contains('demo-persona-active')?'var(--color-primary-50)':'none'">
                <span style="width:28px;height:28px;border-radius:50%;background:var(--color-success-100);color:var(--color-success-600);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">
                    <i class="fas fa-chalkboard-teacher"></i>
                </span>
                <div style="text-align:left;">
                    <div style="font-weight:600;line-height:1.2;">Teacher</div>
                    <div style="font-size:11px;color:var(--text-muted);">No approval rights</div>
                </div>
            </button>
        </div>
    </div>
</template>

<!-- Mobile nav toggle -->
<button class="mobile-nav-toggle" @click="mobileMenuOpen = !mobileMenuOpen">
    <i class="fas" :class="mobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
</button>
