                            <i class="fas fa-save" style="margin-right:var(--space-1);"></i> Save Cart as Template
                        </button>
                    </div>
                    <p style="color: var(--text-secondary); margin-bottom: var(--space-6);">Pre-built order templates for common supply needs. Select a template to quickly add items to your cart.</p>

                    <!-- Template category tabs -->
                    <div class="flex gap-2 mb-4" style="flex-wrap:wrap;">
                        <button class="btn btn-sm" :class="templateTab === 'all' ? 'btn-primary' : 'btn-ghost'" @click="templateTab = 'all'">All Templates</button>
                        <button class="btn btn-sm" :class="templateTab === 'classroom' ? 'btn-primary' : 'btn-ghost'" @click="templateTab = 'classroom'">
                            <i class="fas fa-chalkboard" style="margin-right:var(--space-1);"></i> Classroom
                        </button>
                        <button class="btn btn-sm" :class="templateTab === 'office' ? 'btn-primary' : 'btn-ghost'" @click="templateTab = 'office'">
                            <i class="fas fa-building" style="margin-right:var(--space-1);"></i> Office
                        </button>
                        <button class="btn btn-sm" :class="templateTab === 'art' ? 'btn-primary' : 'btn-ghost'" @click="templateTab = 'art'">
                            <i class="fas fa-palette" style="margin-right:var(--space-1);"></i> Art & Music
                        </button>
                        <button class="btn btn-sm" :class="templateTab === 'sports' ? 'btn-primary' : 'btn-ghost'" @click="templateTab = 'sports'">
                            <i class="fas fa-futbol" style="margin-right:var(--space-1);"></i> Athletics
                        </button>
                        <button class="btn btn-sm" :class="templateTab === 'tech' ? 'btn-primary' : 'btn-ghost'" @click="templateTab = 'tech'">
                            <i class="fas fa-laptop" style="margin-right:var(--space-1);"></i> Technology
                        </button>
                    </div>

                    <!-- Loading state -->
                    <template x-if="templatesLoading && templates.length === 0">
                        <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:var(--space-4);">
                            <template x-for="i in 4" :key="'tpl-skel-'+i">
                                <div class="card" style="padding:var(--space-5);">
                                    <div class="skeleton" style="width:44px; height:44px; border-radius:var(--radius-lg); margin-bottom:var(--space-3);"></div>
                                    <div class="skeleton" style="height:16px; width:70%; margin-bottom:var(--space-2);"></div>
                                    <div class="skeleton" style="height:12px; width:100%; margin-bottom:var(--space-1);"></div>
                                    <div class="skeleton" style="height:12px; width:60%;"></div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Template cards grid -->
                    <template x-if="!templatesLoading || templates.length > 0">
                    <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:var(--space-4);">
                        <template x-for="tpl in filteredTemplates" :key="tpl.id">
                            <div class="card card-interactive" style="padding:var(--space-5); display:flex; flex-direction:column; gap:var(--space-3);">
                                <!-- Header -->
                                <div class="flex items-center gap-3">
                                    <div :style="'width:44px; height:44px; border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:#fff; background:' + tpl.color">
                                        <i :class="tpl.icon"></i>
                                    </div>
                                    <div style="flex:1; min-width:0;">
                                        <div style="font-weight:var(--font-semibold); font-size:var(--text-base);" x-text="tpl.name"></div>
                                        <div class="flex gap-1 items-center">
                                            <span class="badge badge-neutral" style="font-size:var(--text-2xs);" x-text="tpl.category"></span>
                                            <template x-if="!tpl.is_default">
                                                <span class="badge badge-info" style="font-size:var(--text-2xs);">Custom</span>
                                            </template>
                                        </div>
                                    </div>
                                    <!-- Delete button for user templates -->
                                    <template x-if="!tpl.is_default">
                                        <button class="btn btn-ghost btn-icon btn-sm" @click.stop="
                                            fetch('/api/templates/' + tpl.id + '?session_id=' + encodeURIComponent(sessionId || ''), {method:'DELETE'})
                                                .then(() => { templates = templates.filter(t => t.id !== tpl.id); showToast('Template deleted', 'fas fa-trash'); });
                                        " title="Delete template">
                                            <i class="fas fa-trash" style="font-size:var(--text-xs); color:var(--color-danger-500);"></i>
                                        </button>
                                    </template>
                                </div>
                                <!-- Description -->
                                <p style="font-size:var(--text-sm); color:var(--text-secondary); line-height:1.5; flex:1;" x-text="tpl.description"></p>
                                <!-- Items preview -->
                                <div style="font-size:var(--text-xs); color:var(--text-muted); border-top:1px solid var(--border-light); padding-top:var(--space-2);">
                                    <span x-text="tpl.items.length + ' items'"></span> &middot;
                                    <span x-text="'~' + formatPrice(tpl.items.reduce((s,i) => s + i.price * i.qty, 0))"></span> est. total
                                </div>
                                <!-- Expand/collapse items with qty controls -->
                                <template x-if="expandedTemplate === tpl.id">
                                    <div style="border-top:1px solid var(--border-light); padding-top:var(--space-2);">
                                        <template x-for="item in tpl.items" :key="item.item_id || item.name">
                                            <div class="flex items-center gap-2" style="padding:var(--space-1) 0; font-size:var(--text-xs);">
                                                <div style="flex:1; min-width:0;">
                                                    <div style="color:var(--text-primary); font-weight:var(--font-medium);" x-text="item.name" class="truncate"></div>
                                                    <div style="color:var(--text-muted);" x-text="item.vendor + (item.item_code ? ' · ' + item.item_code : '')"></div>
                                                </div>
                                                <!-- Qty controls -->
                                                <div class="flex items-center gap-1">
                                                    <button class="btn btn-ghost btn-sm" style="width:22px; height:22px; padding:0; min-width:0; font-size:10px;"
                                                            @click.stop="item.qty = Math.max(1, item.qty - 1)">
                                                        <i class="fas fa-minus"></i>
                                                    </button>
                                                    <span style="min-width:20px; text-align:center; font-weight:var(--font-semibold);" x-text="item.qty"></span>
                                                    <button class="btn btn-ghost btn-sm" style="width:22px; height:22px; padding:0; min-width:0; font-size:10px;"
                                                            @click.stop="item.qty++">
                                                        <i class="fas fa-plus"></i>
                                                    </button>
                                                </div>
                                                <span style="white-space:nowrap; color:var(--text-secondary); min-width:50px; text-align:right;" x-text="formatPrice(item.price)"></span>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <!-- Actions -->
                                <div class="flex gap-2">
                                    <button class="btn btn-primary btn-sm" style="flex:1;" @click.stop="addTemplateToCart(tpl)">
                                        <i class="fas fa-cart-plus" style="margin-right:var(--space-1);"></i> Add All to Cart
                                    </button>
                                    <button class="btn btn-ghost btn-sm" @click.stop="expandedTemplate = expandedTemplate === tpl.id ? null : tpl.id"
                                            :title="expandedTemplate === tpl.id ? 'Hide items' : 'Preview items'">
                                        <i :class="expandedTemplate === tpl.id ? 'fas fa-chevron-up' : 'fas fa-chevron-down'"></i>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                    </template>

                    <!-- Empty state for filtered -->
                    <template x-if="!templatesLoading && filteredTemplates.length === 0">
                        <div class="empty-state" style="padding:var(--space-8);">
                            <div class="empty-state-icon"><i class="fas fa-filter"></i></div>
                            <div class="empty-state-title">No Templates in This Category</div>
                            <p>Try selecting a different category above.</p>
                            <button class="btn btn-primary mt-4" @click="templateTab = 'all'">View All Templates</button>
                        </div>
                    </template>
                </div>
            </template>

            <!-- =============== SAVED LISTS VIEW =============== -->
            <template x-if="ready && activeView === 'savedLists'">
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h1 style="font-size: var(--text-2xl);">Saved Lists</h1>
                        <button class="btn btn-primary" @click="startCreateList()" x-show="!createListMode">
                            <i class="fas fa-plus"></i> Create New List
                        </button>
                    </div>

                    <!-- ===== Create List Builder ===== -->
                    <template x-if="createListMode">
                        <div class="card" style="padding: var(--space-5); margin-bottom: var(--space-4);">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--space-4);">
                                <h2 style="font-size: var(--text-lg); font-weight: var(--font-semibold);">
                                    <i class="fas fa-plus-circle" style="color: var(--color-primary-500);"></i> Create New List
                                </h2>
                                <button class="btn btn-ghost btn-sm" @click="cancelCreateList()">
                                    <i class="fas fa-times"></i> Cancel
                                </button>
                            </div>

                            <!-- List name -->
                            <div style="margin-bottom: var(--space-4);">
                                <label style="font-size: var(--text-sm); font-weight: var(--font-medium); display:block; margin-bottom: var(--space-1);">List Name</label>
                                <input type="text" class="input" x-model="createListName" placeholder="e.g., Art Room Supplies, Lab Equipment..." style="max-width: 400px;">
                            </div>

                            <!-- Product search -->
                            <div style="margin-bottom: var(--space-4); position:relative; z-index:10;">
                                <label style="font-size: var(--text-sm); font-weight: var(--font-medium); display:block; margin-bottom: var(--space-1);">Search Products to Add</label>
                                <div style="display:flex; gap:var(--space-2); align-items:stretch;">
                                    <div style="position: relative; flex:1; max-width:500px;">
                                        <div class="input-icon-wrapper">
                                            <i class="input-icon" :class="createListLoading ? 'fas fa-spinner fa-spin' : 'fas fa-search'"></i>
                                            <input type="text" class="input input-with-icon" x-model="createListSearch"
                                                   @input="createListAutocomplete()"
                                                   @keydown.escape="createListResults = []"
                                                   placeholder="Search by product name, SKU, or keyword...">
                                        </div>

                                    <!-- Search results dropdown -->
                                    <div x-show="createListResults.length > 0" @click.outside="createListResults = []"
                                         style="position:absolute; top:100%; left:0; right:0; z-index:30; background:var(--color-neutral-0); border:1px solid var(--border-default); border-radius:var(--radius-md); box-shadow:var(--shadow-lg); max-height:320px; overflow-y:auto; margin-top:4px;">
                                        <template x-for="result in createListResults" :key="edsProduct.getId(result)">
                                            <button @click="createListAddItem(result); createListResults = []; createListSearch = '';"
                                                    style="display:flex; align-items:center; gap:var(--space-3); width:100%; padding:var(--space-2) var(--space-3); border:none; background:var(--color-neutral-0); text-align:left; cursor:pointer; border-bottom:1px solid var(--border-light); font-size:var(--text-sm);"
                                                    onmouseover="this.style.background='var(--bg-muted)'" onmouseout="this.style.background='var(--color-neutral-0)'">
                                                <i class="fas fa-box" style="color:var(--text-muted); width:16px; text-align:center;"></i>
                                                <div style="flex:1; min-width:0;">
                                                    <div style="font-weight:var(--font-medium); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" x-text="edsProduct.getName(result)"></div>
                                                    <div style="font-size:var(--text-xs); color:var(--text-muted);">
                                                        <span x-text="edsProduct.getVendor(result) || 'No vendor'"></span>
                                                        <span> &middot; </span>
                                                        <span x-text="edsProduct.getId(result)"></span>
                                                    </div>
                                                </div>
                                                <div style="font-weight:var(--font-semibold); color:var(--color-primary-500); white-space:nowrap;" x-text="formatPrice(edsProduct.getPrice(result))"></div>
                                                <i class="fas fa-plus-circle" style="color:var(--color-success-500);"></i>
                                            </button>
                                        </template>
                                    </div>
                                    </div>
                                    <select class="input" x-model="createListCategoryFilter" @change="if(createListSearch.trim().length >= 2) createListAutocomplete()"
                                            style="max-width:170px; flex-shrink:0;">
                                        <option value="">All Categories</option>
                                        <template x-for="cat in categories" :key="cat.category_id || cat.name">
                                            <option :value="cat.name" x-text="cat.name"></option>
                                        </template>
                                    </select>
                                    <select class="input" x-model="createListVendorFilter" @change="if(createListSearch.trim().length >= 2) createListAutocomplete()"
                                            style="max-width:170px; flex-shrink:0;">
                                        <option value="">All Suppliers</option>
                                        <template x-for="v in vendors.slice(0, 50)" :key="v.vendor_id || v.name">
                                            <option :value="v.name" x-text="v.name"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>

                            <!-- Items in the list being built -->
                            <div style="margin-bottom: var(--space-4);">
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--space-2);">
                                    <label style="font-size: var(--text-sm); font-weight: var(--font-medium);">
                                        Items <span style="color:var(--text-muted);" x-text="'(' + createListItems.length + ')'"></span>
                                    </label>
                                    <template x-if="createListItems.length > 0">
                                        <span style="font-size:var(--text-sm); font-weight:var(--font-semibold); color:var(--color-primary-500);" x-text="'Total: ' + formatPrice(createListTotal)"></span>
                                    </template>
                                </div>

                                <template x-if="createListItems.length === 0">
                                    <div style="padding:var(--space-6); text-align:center; border:2px dashed var(--border-default); border-radius:var(--radius-md); color:var(--text-muted);">
                                        <i class="fas fa-search" style="font-size:var(--text-xl); margin-bottom:var(--space-2); display:block;"></i>
                                        <p style="font-size:var(--text-sm);">Search above to add products to your list</p>
                                    </div>
                                </template>

                                <template x-if="createListItems.length > 0">
                                    <div style="border:1px solid var(--border-light); border-radius:var(--radius-md); overflow:hidden;">
                                        <template x-for="(item, idx) in createListItems" :key="edsProduct.getId(item) + '-' + idx">
                                            <div :style="'display:flex; align-items:center; gap:var(--space-3); padding:var(--space-2) var(--space-3); font-size:var(--text-sm);' + (idx < createListItems.length - 1 ? ' border-bottom:1px solid var(--border-light);' : '')">
                                                <div style="flex:1; min-width:0; overflow:hidden;">
                                                    <div style="font-weight:var(--font-medium); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;" x-text="edsProduct.getName(item)"></div>
                                                    <div style="font-size:var(--text-xs); color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" x-text="edsProduct.getVendor(item)"></div>
                                                </div>
                                                <div style="display:flex; align-items:center; gap:var(--space-1); flex-shrink:0;">
                                                    <button class="btn btn-ghost btn-sm" style="padding:2px 6px; min-width:auto;" @click="createListUpdateQty(idx, -1)">
                                                        <i class="fas fa-minus" style="font-size:10px;"></i>
                                                    </button>
                                                    <span style="min-width:24px; text-align:center; font-weight:var(--font-semibold);" x-text="item.quantity || 1"></span>
                                                    <button class="btn btn-ghost btn-sm" style="padding:2px 6px; min-width:auto;" @click="createListUpdateQty(idx, 1)">
                                                        <i class="fas fa-plus" style="font-size:10px;"></i>
                                                    </button>
                                                </div>
                                                <div style="width:70px; text-align:right; font-weight:var(--font-semibold); flex-shrink:0;" x-text="formatPrice(edsProduct.getPrice(item) * (item.quantity || 1))"></div>
                                                <button class="btn btn-ghost btn-sm" style="padding:2px 6px; min-width:auto; color:var(--color-accent-500); flex-shrink:0;" @click="createListRemoveItem(idx)">
                                                    <i class="fas fa-trash" style="font-size:11px;"></i>
                                                </button>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>

                            <!-- Save / Cancel actions -->
                            <div style="display:flex; gap:var(--space-2); justify-content:flex-end; padding-top:var(--space-3); border-top:1px solid var(--border-light);">
                                <button class="btn btn-ghost" @click="cancelCreateList()">Cancel</button>
                                <button class="btn btn-primary" @click="saveCreatedList()" :disabled="createListItems.length === 0 || !createListName.trim()">
                                    <i class="fas fa-bookmark"></i> Save List
                                </button>
                            </div>
                        </div>
                    </template>

                    <template x-if="!createListMode && savedLists.length === 0">
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="fas fa-bookmark"></i></div>
                            <div class="empty-state-title">No saved lists yet</div>
                            <p>Create a custom list or save product lists while browsing to quickly reorder them later.</p>
                            <div style="display:flex; gap:var(--space-2); justify-content:center; margin-top:var(--space-4);">
                                <button class="btn btn-primary" @click="startCreateList()"><i class="fas fa-plus"></i> Create New List</button>
                                <button class="btn btn-ghost" @click="switchView('browse')">Browse Products</button>
                            </div>
                        </div>
                    </template>

                    <div class="flex flex-col gap-3" x-show="!createListMode">
                        <template x-for="list in savedLists" :key="list.name">
                            <div class="card" style="padding: var(--space-4);">
                                <div class="flex justify-between items-center">
                                    <div style="flex:1; min-width:0; cursor:pointer;" @click="toggleListExpanded(list)">
                                        <div style="display:flex; align-items:center; gap:var(--space-2);">
                                            <i class="fas fa-chevron-right" style="font-size:var(--text-xs); color:var(--text-muted); transition:transform 0.2s;" :style="list._expanded ? 'transform:rotate(90deg)' : ''"></i>
                                            <span style="font-weight: var(--font-semibold); font-size: var(--text-base);" x-text="list.name"></span>
                                        </div>
                                        <div style="font-size: var(--text-xs); color: var(--text-muted); margin-left:22px;" x-text="list.count + ' items &middot; Saved ' + list.savedAt"></div>
                                    </div>
                                    <div class="flex gap-2" style="flex-shrink:0;">
                                        <button class="btn btn-ghost btn-sm" @click="editSavedList(list)" title="Edit list">
                                            <i class="fas fa-pen"></i> Edit
                                        </button>
                                        <button class="btn btn-primary btn-sm" @click="addListToCart(list)">
                                            <i class="fas fa-cart-plus"></i> Add to Cart
                                        </button>
                                        <button class="btn btn-ghost btn-sm" @click="deleteSavedList(list.name)">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                                <!-- Expandable item preview -->
                                <div x-show="list._expanded" x-collapse style="margin-top:var(--space-3); border-top:1px solid var(--border-light); padding-top:var(--space-3);">
                                    <template x-for="item in list.items" :key="item.ItemNumber || item.Description">
                                        <div style="display:flex; align-items:center; gap:var(--space-3); padding:var(--space-1) 0; font-size:var(--text-sm);">
                                            <div style="flex:1; min-width:0; overflow:hidden;">
                                                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block;" x-text="item.Description || item.name || 'Item'"></span>
                                            </div>
                                            <span style="color:var(--text-muted); flex-shrink:0; font-size:var(--text-xs);" x-text="'x' + (item.quantity || 1)"></span>
                                            <span style="font-weight:var(--font-semibold); flex-shrink:0; min-width:65px; text-align:right;" x-text="formatPrice((item.Price || 0) * (item.quantity || 1))"></span>
                                        </div>
                                    </template>
                                    <div style="display:flex; justify-content:flex-end; padding-top:var(--space-2); border-top:1px solid var(--border-light); margin-top:var(--space-2);">
                                        <span style="font-size:var(--text-sm); font-weight:var(--font-bold); color:var(--color-primary-500);"
                                              x-text="'Total: ' + formatPrice(list.items.reduce((s, i) => s + ((i.Price || 0) * (i.quantity || 1)), 0))"></span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- =============== APPROVALS VIEW (admin) =============== -->
            <template x-if="ready && activeView === 'approvals' && isAdmin">
                <div>
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: var(--space-4);">

                            <i class="fas fa-sync-alt" :class="{ 'fa-spin': approvalsLoading }"></i> Refresh
                        </button>
                    </div>

                    <div style="margin-bottom:var(--space-4); max-width:500px; position:relative;">
                        <div class="input-icon-wrapper">
                            <i class="input-icon fas fa-search"></i>
                            <input type="text" class="input input-with-icon" x-model="approvalsSearch"
                                   @input="approvalsSearchInput()"
                                   @keydown.escape="clearApprovalsSearch()"
                                   placeholder="Search by requisition #, school, district, or submitter...">
                        </div>
                        <button x-show="approvalsSearch.trim()" @click="clearApprovalsSearch()"
                                style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-muted); padding:4px;"
                                title="Clear search">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    </div>

                    <!-- Error state -->
                    <template x-if="approvalsError">
                        <div class="card" style="padding: var(--space-4); border-left: 3px solid var(--color-accent-500); margin-bottom: var(--space-4);">
                            <div style="display:flex; align-items:center; gap: var(--space-2); color: var(--color-accent-600);">
                                <i class="fas fa-exclamation-circle"></i>
                                <span x-text="approvalsError"></span>
                            </div>
                        </div>
                    </template>

                    <!-- Loading state -->
                    <template x-if="approvalsLoading && approvalReqs.length === 0">
                        <div style="text-align:center; padding: var(--space-8); color: var(--text-muted);">
                            <i class="fas fa-spinner fa-spin" style="font-size: var(--text-2xl); margin-bottom: var(--space-3);"></i>
                            <p>Loading pending approvals...</p>
                        </div>
                    </template>

                    <!-- Empty state -->
                    <template x-if="!approvalsLoading && !approvalsError && approvalReqs.length === 0">
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="fas fa-check-circle"></i></div>
                            <div class="empty-state-title">All caught up!</div>
                            <p>No requisitions need your approval right now.</p>
                        </div>
                    </template>

                    <!-- Approvals list -->
                    <div x-show="approvalReqs.length > 0">
                        <div style="font-size: var(--text-sm); color: var(--text-muted); margin-bottom: var(--space-3);">
                            Showing <span x-text="approvalReqs.length"></span> of <span x-text="approvalsTotal.toLocaleString()"></span> pending requisitions
                        </div>

                        <div style="display:flex; flex-direction:column; gap: var(--space-3);">
                            <template x-for="req in approvalReqs" :key="req.requisition_id">
                                <div class="card" style="padding: var(--space-4);">
                                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap: var(--space-4); flex-wrap:wrap;">
                                        <!-- Left: req info -->
                                        <div style="flex:1; min-width:200px;">
                                            <div style="display:flex; align-items:center; gap: var(--space-2); margin-bottom: var(--space-1);">
                                                <span style="font-weight: var(--font-bold); font-size: var(--text-md);" x-text="req.requisition_number || ('REQ-' + req.requisition_id)"></span>
                                                <span class="badge" :class="req.status === 'Submitted' ? 'badge-primary' : 'badge-warning'" x-text="req.status"></span>
                                            </div>
                                            <div style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-1);">
                                                Submitted by <strong x-text="req.submitted_by || 'Unknown'"></strong>
                                                <span style="color: var(--text-muted);" x-text="' \u2022 ' + approvalTimeAgo(req.created_at)"></span>
                                            </div>
                                            <div x-show="req.school_name || req.district_name" style="font-size: var(--text-xs); color: var(--text-muted); margin-bottom: var(--space-1);">
                                                <i class="fas fa-school" style="margin-right:3px;"></i>
                                                <span x-text="req.school_name || ''"></span>
                                                <template x-if="req.school_name && req.district_name">
                                                    <span style="color:var(--text-muted);"> &mdash; </span>
                                                </template>
                                                <span x-text="req.district_name || ''"></span>
                                            </div>
                                            <div style="display:flex; gap: var(--space-4); font-size: var(--text-sm); color: var(--text-muted);">
                                                <span><i class="fas fa-box" style="margin-right:4px;"></i> <span x-text="(req.item_count || 0) + ' items'"></span></span>
                                                <span style="font-weight: var(--font-semibold); color: var(--color-primary-500);" x-text="formatPrice(req.total_amount)"></span>
                                            </div>
                                            <template x-if="req.notes_preview">
                                                <div style="font-size: var(--text-xs); color: var(--text-muted); margin-top: var(--space-2); font-style:italic;" x-text="req.notes_preview"></div>
                                            </template>
                                        </div>

                                        <!-- Right: action buttons -->
                                        <div style="display:flex; gap: var(--space-2); align-items:center; flex-shrink:0;">
                                            <button class="btn btn-ghost btn-sm" @click="openApprovalDetail(req)">
                                                <i class="fas fa-eye"></i> View
                                            </button>
                                            <button class="btn btn-primary btn-sm" @click="promptApprove(req)">
                                                <i class="fas fa-check"></i> Approve
                                            </button>
                                            <button class="btn btn-sm" style="background: var(--color-accent-500); color: white; border-color: var(--color-accent-500);" @click="promptReject(req)">
                                                <i class="fas fa-times"></i> Reject
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Skeleton loading for infinite scroll -->
                        <div x-show="approvalsLoadingMore" style="display:flex; flex-direction:column; gap:var(--space-3); margin-top:var(--space-3);">
                            <template x-for="i in 3" :key="'skel-'+i">
                                <div class="card" style="padding:var(--space-4);">
                                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:var(--space-4);">
                                        <div style="flex:1;">
                                            <div class="skeleton" style="height:18px; width:120px; margin-bottom:var(--space-2);"></div>
                                            <div class="skeleton" style="height:14px; width:250px; margin-bottom:var(--space-2);"></div>
                                            <div class="skeleton" style="height:12px; width:200px; margin-bottom:var(--space-2);"></div>
                                            <div class="skeleton" style="height:14px; width:150px;"></div>
                                        </div>
                                        <div style="display:flex; gap:var(--space-2);">
                                            <div class="skeleton" style="height:32px; width:60px; border-radius:var(--radius-md);"></div>
                                            <div class="skeleton" style="height:32px; width:80px; border-radius:var(--radius-md);"></div>
                                            <div class="skeleton" style="height:32px; width:70px; border-radius:var(--radius-md);"></div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- End of list indicator -->
                        <div x-show="!approvalsLoadingMore && !approvalsHasMore && approvalReqs.length > 0" style="text-align:center; padding:var(--space-4); color:var(--text-muted); font-size:var(--text-sm);">
                            All <span x-text="approvalReqs.length"></span> approvals loaded
                        </div>
                    </div>

                    <!-- ===== Approval Detail Modal ===== -->
                    <template x-if="showApprovalDetail && selectedApproval">
                        <div class="overlay active" style="z-index:50;" @click.self="closeApprovalDetail()">
                            <div class="card" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; max-width:700px; max-height:80vh; overflow-y:auto; z-index:51; padding: var(--space-5);" @click.stop>
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--space-4);">
                                    <h2 style="font-size: var(--text-xl);">
                                        <span x-text="selectedApproval.requisition_number || ('REQ-' + selectedApproval.requisition_id)"></span>
                                    </h2>
                                    <button class="btn btn-ghost btn-icon btn-sm" @click="closeApprovalDetail()">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>

                                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-bottom: var(--space-4); font-size: var(--text-sm);">
                                    <div><span style="color: var(--text-muted);">Status:</span> <span class="badge badge-warning" x-text="selectedApproval.status"></span></div>
                                    <div><span style="color: var(--text-muted);">Submitted by:</span> <strong x-text="selectedApproval.submitted_by || 'Unknown'"></strong></div>
                                    <div><span style="color: var(--text-muted);">Items:</span> <span x-text="selectedApproval.item_count || 0"></span></div>
                                    <div><span style="color: var(--text-muted);">Total:</span> <strong style="color: var(--color-primary-500);" x-text="formatPrice(selectedApproval.total_amount)"></strong></div>
                                </div>

                                <!-- Line items -->
                                <h3 style="font-size: var(--text-md); font-weight: var(--font-semibold); margin-bottom: var(--space-2);">Line Items</h3>
                                <template x-if="approvalDetailLoading">
                                    <div style="text-align:center; padding: var(--space-4); color: var(--text-muted);">
                                        <i class="fas fa-spinner fa-spin"></i> Loading items...
                                    </div>
                                </template>
                                <template x-if="!approvalDetailLoading && approvalDetailItems.length > 0">
                                    <div style="border: 1px solid var(--border-light); border-radius: var(--radius-md); overflow:hidden; margin-bottom: var(--space-4);">
                                        <table style="width:100%; font-size: var(--text-sm); border-collapse: collapse;">
                                            <thead>
                                                <tr style="background: var(--bg-subtle); text-align:left;">
                                                    <th style="padding: var(--space-2) var(--space-3);">Item</th>
                                                    <th style="padding: var(--space-2) var(--space-3); text-align:center;">Qty</th>
                                                    <th style="padding: var(--space-2) var(--space-3); text-align:right;">Price</th>
                                                    <th style="padding: var(--space-2) var(--space-3); text-align:right;">Subtotal</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="item in approvalDetailItems" :key="item.line_id || item.item_id || item.id">
                                                    <tr style="border-top: 1px solid var(--border-light);">
                                                        <td style="padding: var(--space-2) var(--space-3);">
                                                            <div style="font-weight: var(--font-medium);" x-text="item.product_name || item.description || item.item_number || 'Item'"></div>
                                                            <div style="font-size: var(--text-xs); color: var(--text-muted);" x-text="item.sku || item.item_number || ''"></div>
                                                        </td>
                                                        <td style="padding: var(--space-2) var(--space-3); text-align:center;" x-text="item.quantity || 1"></td>
                                                        <td style="padding: var(--space-2) var(--space-3); text-align:right;" x-text="formatPrice(item.unit_price || item.price || 0)"></td>
                                                        <td style="padding: var(--space-2) var(--space-3); text-align:right; font-weight: var(--font-semibold);" x-text="formatPrice(item.extended_price || (item.unit_price || item.price || 0) * (item.quantity || 1))"></td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>

                                <!-- Action buttons -->
                                <div style="display:flex; gap: var(--space-3); justify-content:flex-end; padding-top: var(--space-3); border-top: 1px solid var(--border-light);">
                                    <button class="btn btn-ghost" @click="closeApprovalDetail()">Close</button>
                                    <button class="btn" style="background: var(--color-accent-500); color: white; border-color: var(--color-accent-500);" @click="promptReject(selectedApproval)">
                                        <i class="fas fa-times"></i> Reject
                                    </button>
                                    <button class="btn btn-primary" @click="promptApprove(selectedApproval)">
                                        <i class="fas fa-check"></i> Approve
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- ===== Approve Confirmation Dialog ===== -->
                    <template x-if="showApproveDialog && approveTarget">
                        <div class="overlay active" style="z-index:60;" @click.self="cancelApprove()">
                            <div class="card" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; max-width:450px; z-index:61; padding: var(--space-5);" @click.stop>
                                <h3 style="font-size: var(--text-lg); margin-bottom: var(--space-3);">
                                    <i class="fas fa-check-circle" style="color: var(--color-success-500);"></i> Approve Requisition
                                </h3>
                                <p style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-3);">
                                    Approve <strong x-text="approveTarget.requisition_number || ('REQ-' + approveTarget.requisition_id)"></strong>
                                    for <strong x-text="formatPrice(approveTarget.total_amount)"></strong>?
                                </p>
                                <div style="margin-bottom: var(--space-4);">
                                    <label style="font-size: var(--text-sm); font-weight: var(--font-medium); display:block; margin-bottom: var(--space-1);">Comments (optional)</label>
                                    <textarea class="input" rows="3" x-model="approveComments" placeholder="Add optional comments..." style="resize:vertical;"></textarea>
                                </div>
                                <div style="display:flex; gap: var(--space-2); justify-content:flex-end;">
                                    <button class="btn btn-ghost" @click="cancelApprove()">Cancel</button>
                                    <button class="btn btn-primary" @click="confirmApprove()" :disabled="approveSubmitting">
                                        <template x-if="approveSubmitting"><i class="fas fa-spinner fa-spin"></i></template>
                                        <template x-if="!approveSubmitting"><i class="fas fa-check"></i></template>
                                        Approve
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- ===== Reject Dialog ===== -->
                    <template x-if="showRejectDialog && rejectTarget">
                        <div class="overlay active" style="z-index:60;" @click.self="cancelReject()">
                            <div class="card" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; max-width:450px; z-index:61; padding: var(--space-5);" @click.stop>
                                <h3 style="font-size: var(--text-lg); margin-bottom: var(--space-3);">
                                    <i class="fas fa-times-circle" style="color: var(--color-accent-500);"></i> Reject Requisition
                                </h3>
                                <p style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-3);">
                                    Reject <strong x-text="rejectTarget.requisition_number || ('REQ-' + rejectTarget.requisition_id)"></strong>?
                                    The submitter will be notified.
                                </p>
                                <div style="margin-bottom: var(--space-4);">
                                    <label style="font-size: var(--text-sm); font-weight: var(--font-medium); display:block; margin-bottom: var(--space-1);">
                                        Reason <span style="color: var(--color-accent-500);">*</span>
                                    </label>
                                    <textarea class="input" rows="3" x-model="rejectReason" placeholder="Explain why this requisition is being rejected (min 10 characters)..." style="resize:vertical;" required></textarea>
                                    <div style="font-size: var(--text-xs); color: var(--text-muted); margin-top: var(--space-1);">
                                        <span x-text="rejectReason.length"></span>/500 characters
                                        <span x-show="rejectReason.length > 0 && rejectReason.length < 10" style="color: var(--color-accent-500);"> (minimum 10)</span>
                                    </div>
                                </div>
                                <div style="display:flex; gap: var(--space-2); justify-content:flex-end;">
                                    <button class="btn btn-ghost" @click="cancelReject()">Cancel</button>
                                    <button class="btn" style="background: var(--color-accent-500); color: white; border-color: var(--color-accent-500);"
                                            @click="confirmReject()" :disabled="rejectSubmitting || rejectReason.trim().length < 10">
                                        <template x-if="rejectSubmitting"><i class="fas fa-spinner fa-spin"></i></template>
                                        <template x-if="!rejectSubmitting"><i class="fas fa-times"></i></template>
                                        Reject
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- =============== REPORTS VIEW (admin) =============== -->
            <template x-if="ready && activeView === 'reports' && canViewReports">
                <div>
                    <!-- Header -->
                    <div class="flex justify-between items-center mb-6" style="flex-wrap:wrap;gap:var(--space-3);">
                        <div>
                            <h1 style="font-size: var(--text-2xl); margin:0;">Reports</h1>
                            <p style="color: var(--text-secondary); margin-top: var(--space-1); font-size: var(--text-sm);" x-text="reportsPeriodLabel"></p>
                        </div>
                        <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;align-items:center;">
                            <button class="btn btn-sm" :class="reportsPeriod === 'current' ? 'btn-primary' : 'btn-ghost'" @click="setReportsPeriod('current')">Current Year</button>
                            <button class="btn btn-sm" :class="reportsPeriod === 'previous' ? 'btn-primary' : 'btn-ghost'" @click="setReportsPeriod('previous')">Previous Year</button>
                            <button class="btn btn-sm" :class="reportsPeriod === 'ytd' ? 'btn-primary' : 'btn-ghost'" @click="setReportsPeriod('ytd')">Year to Date</button>
                            <button class="btn btn-sm" :class="reportsPeriod === 'custom' ? 'btn-primary' : 'btn-ghost'" @click="showReportsDatePicker = !showReportsDatePicker">
                                <i class="fas fa-calendar-alt"></i> Custom
                            </button>
                            <div style="width:1px;height:20px;background:var(--color-neutral-200);margin:0 var(--space-1);"></div>
                            <button class="btn btn-sm btn-ghost" @click="reportsExportCSV('all')" :disabled="reportsExporting || reportsLoading" title="Export all reports as CSV">
                                <i class="fas" :class="reportsExporting ? 'fa-spinner fa-spin' : 'fa-file-csv'"></i> CSV
                            </button>
                            <button class="btn btn-sm btn-ghost" @click="reportsExportPDF()" :disabled="reportsExporting || reportsLoading" title="Export formatted PDF report">
                                <i class="fas" :class="reportsExporting ? 'fa-spinner fa-spin' : 'fa-file-pdf'"></i> PDF
                            </button>
                        </div>
                    </div>

                    <!-- Custom date picker -->
                    <template x-if="showReportsDatePicker">
                        <div class="card mb-4" style="padding:var(--space-4);display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;">
                            <label style="font-size:var(--text-sm);font-weight:var(--font-semibold);color:var(--text-secondary);">From</label>
                            <input type="date" class="input" style="width:auto;font-size:var(--text-sm);" x-model="reportsCustomStart">
                            <label style="font-size:var(--text-sm);font-weight:var(--font-semibold);color:var(--text-secondary);">To</label>
                            <input type="date" class="input" style="width:auto;font-size:var(--text-sm);" x-model="reportsCustomEnd">
                            <button class="btn btn-sm btn-primary" @click="applyCustomDateRange()" :disabled="!reportsCustomStart || !reportsCustomEnd">
                                <i class="fas fa-check"></i> Apply
                            </button>
                            <button class="btn btn-sm btn-ghost" @click="showReportsDatePicker = false">Cancel</button>
                        </div>
                    </template>

                    <!-- Loading state -->
                    <template x-if="reportsLoading">
                        <div class="empty-state" style="padding:var(--space-12) 0;">
                            <div class="empty-state-icon"><i class="fas fa-spinner fa-spin"></i></div>
                            <div class="empty-state-title">Loading reports...</div>
                        </div>
                    </template>

                    <template x-if="!reportsLoading && reportsSummary">
                        <div>
                            <!-- ===== Summary Stats Row ===== -->
                            <div class="stats-grid mb-6">
                                <div class="stat-card">
                                    <div class="stat-icon primary"><i class="fas fa-dollar-sign"></i></div>
                                    <div>
                                        <div class="stat-value" x-text="reportsFmtCurrency(reportsSummary.total_spend)"></div>
                                        <div class="stat-label">Total Spend</div>
                                        <template x-if="reportsSummary.vs_last_period">
                                            <div style="font-size:var(--text-2xs);margin-top:2px;" :style="reportsSummary.vs_last_period > 0 ? 'color:var(--color-accent-500)' : 'color:var(--color-success-600)'">
                                                <i class="fas" :class="reportsSummary.vs_last_period > 0 ? 'fa-arrow-up' : 'fa-arrow-down'"></i>
                                                <span x-text="Math.abs(reportsSummary.vs_last_period) + '% vs last period'"></span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon success"><i class="fas fa-file-invoice"></i></div>
                                    <div>
                                        <div class="stat-value" x-text="reportsFmtNumber(reportsSummary.total_orders)"></div>
                                        <div class="stat-label">Total Orders</div>
                                        <template x-if="reportsSummary.orders_vs_last">
                                            <div style="font-size:var(--text-2xs);margin-top:2px;color:var(--text-muted);">
                                                <i class="fas fa-arrow-up"></i>
                                                <span x-text="reportsSummary.orders_vs_last + '% vs last period'"></span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon info"><i class="fas fa-calculator"></i></div>
                                    <div>
                                        <div class="stat-value" x-text="reportsFmtCurrency(reportsSummary.avg_order_value)"></div>
                                        <div class="stat-label">Avg Order Value</div>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon warning"><i class="fas fa-boxes"></i></div>
                                    <div>
                                        <div class="stat-value" x-text="reportsFmtNumber(reportsSummary.total_items)"></div>
                                        <div class="stat-label">Items Ordered</div>
                                    </div>
                                </div>
                            </div>

                            <!-- ===== Tab Navigation ===== -->
                            <div class="rpt-tabs mb-6">
                                <button class="rpt-tab" :class="{ active: reportsTab === 'overview' }" @click="reportsTab = 'overview'">
                                    <i class="fas fa-chart-line"></i> Overview
                                </button>
                                <button class="rpt-tab" :class="{ active: reportsTab === 'vendors' }" @click="reportsTab = 'vendors'">
                                    <i class="fas fa-store"></i> By Vendor
                                </button>
                                <button class="rpt-tab" :class="{ active: reportsTab === 'categories' }" @click="reportsTab = 'categories'">
                                    <i class="fas fa-tags"></i> By Category
                                </button>
                                <button class="rpt-tab" :class="{ active: reportsTab === 'orders' }" @click="reportsTab = 'orders'">
                                    <i class="fas fa-clipboard-list"></i> Orders
                                </button>
                            </div>

                            <!-- ======== OVERVIEW TAB ======== -->
                            <template x-if="reportsTab === 'overview'">
                                <div>
                                    <!-- Monthly Trend + Budget -->
                                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5);" class="mb-6 rpt-responsive-grid">
                                        <!-- Monthly Spend Trend -->
                                        <div class="card" style="padding:var(--space-5);">
                                            <h3 style="font-size:var(--text-lg);margin:0 0 var(--space-4) 0;">Monthly Spending</h3>
                                            <div class="rpt-bar-chart">
                                                <template x-for="m in reportsMonthlyTrend" :key="m.month">
                                                    <div class="rpt-bar-col">
                                                        <div class="rpt-bar-tooltip" x-text="reportsFmtCurrency(m.amount)"></div>
                                                        <div class="rpt-bar" :style="'height:' + reportsTrendHeight(m.amount) + ';background:' + reportsTrendColor(m.amount)"></div>
                                                        <div class="rpt-bar-label" x-text="m.month"></div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>

                                        <!-- Budget Overview -->
                                        <div class="card" style="padding:var(--space-5);">
                                            <h3 style="font-size:var(--text-lg);margin:0 0 var(--space-4) 0;">Budget Overview</h3>
                                            <div style="text-align:center;margin-bottom:var(--space-4);">
                                                <div class="rpt-budget-ring" :style="'--pct:' + reportsSummary.budget_percent">
