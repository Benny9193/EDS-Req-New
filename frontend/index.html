<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDS Universal Requisition</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Design System -->
    <link rel="stylesheet" href="css/design-system.css">

    <!-- Alpine.js + Focus plugin (for x-trap) -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.14.8/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()" x-cloak>

<!-- ===== App Layout ===== -->
<div class="app-layout">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar" :class="{ 'mobile-open': mobileMenuOpen }">
        <div class="sidebar-header">
            <div class="sidebar-logo">EDS</div>
            <div>
                <div class="sidebar-brand">EDS</div>
                <div style="font-size: var(--text-xs); color: var(--text-muted);">Requisition System</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="sidebar-section-label">Main</div>
            <button class="sidebar-nav-item" :class="{ active: activeView === 'dashboard' }" @click="switchView('dashboard'); mobileMenuOpen = false">
                <i class="fas fa-home"></i> Dashboard
            </button>
            <button class="sidebar-nav-item" :class="{ active: activeView === 'browse' }" @click="switchView('browse'); mobileMenuOpen = false">
                <i class="fas fa-store"></i> Browse Products
            </button>
            <button class="sidebar-nav-item" :class="{ active: activeView === 'orders' }" @click="switchView('orders'); mobileMenuOpen = false">
                <i class="fas fa-clipboard-list"></i> My Orders
                <template x-if="orderCount > 0">
                    <span class="badge badge-primary" style="margin-left:auto" x-text="orderCount"></span>
                </template>
            </button>

            <div class="sidebar-section-label">Shopping</div>
            <button class="sidebar-nav-item" :class="{ active: activeView === 'templates' }" @click="switchView('templates'); mobileMenuOpen = false">
                <i class="fas fa-copy"></i> Template Orders
            </button>
            <button class="sidebar-nav-item" :class="{ active: activeView === 'savedLists' }" @click="switchView('savedLists'); mobileMenuOpen = false">
                <i class="fas fa-bookmark"></i> Saved Lists
                <template x-if="savedLists.length > 0">
                    <span class="badge badge-neutral" style="margin-left:auto" x-text="savedLists.length"></span>
                </template>
            </button>

            <!-- Admin section (approvals: admin only) -->
            <template x-if="isAdmin">
                <div>
                    <div class="sidebar-section-label">Admin</div>
                    <button class="sidebar-nav-item" :class="{ active: activeView === 'approvals' }" @click="switchView('approvals'); mobileMenuOpen = false">
                        <i class="fas fa-check-circle"></i> Approvals
                        <template x-if="pendingApprovalCount > 0">
                            <span class="badge badge-accent" style="margin-left:auto" x-text="pendingApprovalCount"></span>
                        </template>
                    </button>
                </div>
            </template>
            <!-- Reports section (admin + reports_viewer/department_head/principal) -->
            <template x-if="canViewReports">
                <div>
                    <template x-if="!isAdmin"><div class="sidebar-section-label">Reports</div></template>
                    <button class="sidebar-nav-item" :class="{ active: activeView === 'reports' }" @click="switchView('reports'); mobileMenuOpen = false">
                        <i class="fas fa-chart-bar"></i> Reports
                    </button>
                </div>
            </template>
        </nav>

        <div class="sidebar-footer">
            <button class="sidebar-nav-item" @click="logout()">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- ===== Main Content ===== -->
    <div class="main-content">

        <!-- ===== Top Header ===== -->
        <header class="top-header">
            <div class="search-box input-icon-wrapper" style="position:relative" @click.outside="showGlobalAutocomplete = false">
                <i class="input-icon" :class="globalAutocompleteLoading ? 'fas fa-spinner fa-spin' : 'fas fa-search'"></i>
                <input type="text" class="input" placeholder="Search for supplies..."
                       x-model="globalSearch"
                       @input="globalAutocomplete()"
                       @keydown.enter="globalSearchSubmit()"
                       @keydown.escape="showGlobalAutocomplete = false"
                       @focus="if(globalSearch.trim().length >= 2 && globalAutocompleteSuggestions.length) showGlobalAutocomplete = true"
                       role="combobox"
                       aria-autocomplete="list"
                       aria-controls="global-autocomplete-list"
                       :aria-expanded="showGlobalAutocomplete">

                <!-- Autocomplete dropdown -->
                <div x-show="showGlobalAutocomplete" id="global-autocomplete-list" role="listbox" class="autocomplete-dropdown" x-cloak>
                    <!-- Loading state -->
                    <template x-if="globalAutocompleteLoading && globalAutocompleteSuggestions.length === 0">
                        <div style="padding: var(--space-3) var(--space-4); display:flex; align-items:center; gap: var(--space-2); color: var(--text-muted); font-size: var(--text-sm);">
                            <div class="spinner" style="width:16px;height:16px;border-width:2px;"></div>
                            <span>Searching...</span>
                        </div>
                    </template>
                    <!-- Results -->
                    <template x-for="(s, i) in globalAutocompleteSuggestions" :key="i">
                        <div role="option" class="autocomplete-item" style="cursor:pointer;"
                             @click="selectGlobalAutocomplete(s)">
                            <i class="fas fa-box" style="color: var(--text-muted); font-size: var(--text-xs); flex-shrink:0;"></i>
                            <div style="flex:1; min-width:0;">
                                <div style="font-weight: var(--font-medium);" x-text="s.Description || s.name || ''"></div>
                                <div style="font-size: var(--text-xs); color: var(--text-muted);" x-text="s.VendorName || ''"></div>
                            </div>
                            <div style="font-size: var(--text-xs); font-weight: var(--font-bold); color: var(--color-primary-500); flex-shrink:0; white-space:nowrap;"
                                 x-text="s.Price ? formatPrice(s.Price) : ''"></div>
                        </div>
                    </template>
                </div>
            </div>

            <div style="display:flex; align-items:center; gap: var(--space-3); margin-left: auto;">
                <!-- Cart button -->
                <button class="btn btn-ghost btn-icon" style="position:relative" @click="cartOpen = !cartOpen">
                    <i class="fas fa-shopping-cart"></i>
                    <template x-if="cartCount > 0">
                        <span style="position:absolute;top:-4px;right:-4px;background:var(--color-accent-500);color:white;font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;" x-text="cartCount"></span>
                    </template>
                </button>

                <!-- User menu -->
                <div style="position:relative;" @click.outside="showUserMenu = false">
                    <button class="flex items-center gap-2" style="cursor:pointer;background:none;border:none;font-family:inherit;padding:0;" @click="showUserMenu = !showUserMenu" @keydown.escape="showUserMenu = false">
                        <div class="avatar avatar-sm" x-text="userInitials()"></div>
                        <span style="font-size: var(--text-sm); font-weight: var(--font-medium);" x-text="userName()"></span>
                        <i class="fas fa-chevron-down" style="font-size:var(--text-xs);color:var(--text-muted);"></i>
                    </button>
                    <div x-show="showUserMenu" x-transition style="position:absolute;top:100%;right:0;margin-top:var(--space-2);background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);min-width:180px;z-index:var(--z-dropdown);overflow:hidden;">
                        <div style="padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-light);">
                            <div style="font-weight:var(--font-semibold);font-size:var(--text-sm);" x-text="userName()"></div>
                            <div style="font-size:var(--text-xs);color:var(--text-muted);" x-text="isAdmin ? 'Administrator' : 'User'"></div>
                        </div>
                        <button class="sidebar-nav-item" style="margin:0;border-radius:0;" @click="switchView('orders'); showUserMenu = false">
                            <i class="fas fa-clipboard-list"></i> My Orders
                        </button>
                        <button class="sidebar-nav-item" style="margin:0;border-radius:0;color:var(--color-accent-500);" @click="logout()">
                            <i class="fas fa-sign-out-alt"></i> Sign Out
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- ===== Page Content ===== -->
        <div class="page-content">

            <!-- Loading state -->
            <template x-if="!ready">
                <div class="empty-state">
                    <div class="spinner" style="margin: 0 auto var(--space-4);"></div>
                    <p>Loading...</p>
                </div>
            </template>

            <!-- =============== DASHBOARD VIEW =============== -->
            <template x-if="ready && activeView === 'dashboard'">
                <div>
                    <!-- Welcome -->
                    <div class="mb-6">
                        <h1 style="font-size: var(--text-2xl);">Welcome back<span x-show="getUserDisplayName()" x-text="', ' + getUserDisplayName()"></span></h1>
                        <p style="color: var(--text-secondary); margin-top: var(--space-1);" x-text="isAdmin ? 'Here\'s your admin overview' : 'Ready to place an order?'"></p>
                    </div>

                    <!-- ===== Alert Banners ===== -->
                    <template x-if="visibleAlerts().length > 0">
                        <div class="dash-alerts mb-6">
                            <template x-for="(alert, idx) in visibleAlerts()" :key="idx">
                                <div class="dash-alert" :class="'dash-alert-' + alert.type">
                                    <i :class="alert.icon" class="dash-alert-icon"></i>
                                    <div class="dash-alert-body">
                                        <div class="dash-alert-title" x-text="alert.title"></div>
                                        <div class="dash-alert-message" x-text="alert.message"></div>
                                    </div>
                                    <button class="dash-alert-dismiss" @click="dismissAlert(idx)" title="Dismiss">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- ===== Stats Row ===== -->
                    <div class="stats-grid mb-6">
                        <div class="stat-card">
                            <div class="stat-icon primary"><i class="fas fa-shopping-cart"></i></div>
                            <div>
                                <div class="stat-value" x-text="cartCount">0</div>
                                <div class="stat-label">Items in Cart</div>
                            </div>
                        </div>
                        <div class="stat-card" @click="switchView('orders')" style="cursor:pointer;">
                            <div class="stat-icon success"><i class="fas fa-clipboard-check"></i></div>
                            <div>
                                <div class="stat-value" x-text="dashboardOrderCounts.total_active || orderCount">0</div>
                                <div class="stat-label">Active Orders</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon info"><i class="fas fa-box-open"></i></div>
                            <div>
                                <div class="stat-value" x-text="(totalProductCount || browseTotal || products.length).toLocaleString()">0</div>
                                <div class="stat-label">Products Available</div>
                            </div>
                        </div>
                        <template x-if="isAdmin && dashboardApproverInfo">
                            <div class="stat-card" @click="switchView('approvals')" style="cursor:pointer;">
                                <div class="stat-icon warning"><i class="fas fa-hourglass-half"></i></div>
                                <div>
                                    <div class="stat-value" x-text="dashboardPendingApprovals.count">0</div>
                                    <div class="stat-label">Pending Approvals</div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- ===== Budget, Approvals & Orders Row ===== -->
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:var(--space-5);" class="mb-6">
                        <!-- Budget Summary (clickable to expand details) -->
                        <template x-if="dashboardBudget && dashboardBudget.budget > 0">
                            <div class="card" style="padding: var(--space-5); cursor:pointer; transition:box-shadow 0.15s;" @click="showBudgetDetail = !showBudgetDetail"
                                 onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow=''">
                                <div class="flex justify-between items-center" style="margin-bottom: var(--space-4);">
                                    <div style="display:flex; align-items:center; gap:var(--space-2);">
                                        <h2 style="font-size: var(--text-lg); margin: 0;">My Budget</h2>
                                        <i class="fas fa-chevron-right" style="font-size:var(--text-xs); color:var(--text-muted); transition:transform 0.2s;" :style="showBudgetDetail ? 'transform:rotate(90deg)' : ''"></i>
                                    </div>
                                    <span class="badge" :class="{
                                        'badge-success': budgetStatusLabel() === 'Healthy' || budgetStatusLabel() === 'On Track',
                                        'badge-warning': budgetStatusLabel() === 'Warning',
                                        'badge-accent': budgetStatusLabel() === 'Critical'
                                    }" x-text="budgetStatusLabel()"></span>
                                </div>
                                <!-- Progress bar -->
                                <div class="dash-budget-bar-track">
                                    <div class="dash-budget-bar-fill" :style="'width:' + Math.min(dashboardBudget.percent, 100) + '%; background:' + budgetBarColor()"></div>
                                </div>
                                <div class="flex justify-between" style="font-size: var(--text-xs); color: var(--text-muted); margin-top: var(--space-2);">
                                    <span x-text="'$' + dashboardBudget.spent.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0}) + ' spent'"></span>
                                    <span x-text="dashboardBudget.percent + '% used'"></span>
                                </div>
                                <!-- Budget numbers -->
                                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); margin-top: var(--space-4);">
                                    <div>
                                        <div style="font-size: var(--text-xs); color: var(--text-muted);">Budget</div>
                                        <div style="font-weight: var(--font-bold); font-size: var(--text-base);" x-text="'$' + dashboardBudget.budget.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})"></div>
                                    </div>
                                    <div>
                                        <div style="font-size: var(--text-xs); color: var(--text-muted);">Spent</div>
                                        <div style="font-weight: var(--font-bold); font-size: var(--text-base);" x-text="'$' + dashboardBudget.spent.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})"></div>
                                    </div>
                                    <div>
                                        <div style="font-size: var(--text-xs); color: var(--text-muted);">Remaining</div>
                                        <div style="font-weight: var(--font-bold); font-size: var(--text-base); color: var(--color-success-600);" x-text="'$' + dashboardBudget.remaining.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})"></div>
                                    </div>
                                </div>
                                <!-- Expanded budget breakdown -->
                                <div x-show="showBudgetDetail" @click.stop style="margin-top:var(--space-4); padding-top:var(--space-4); border-top:1px solid var(--border-light);">
                                    <h3 style="font-size:var(--text-sm); font-weight:var(--font-semibold); margin-bottom:var(--space-3);">Spending by Category</h3>
                                    <template x-if="dashboardBudget.breakdown && dashboardBudget.breakdown.length > 0">
                                        <div style="display:flex; flex-direction:column; gap:var(--space-2);">
                                            <template x-for="item in dashboardBudget.breakdown" :key="item.category">
                                                <div style="display:flex; align-items:center; gap:var(--space-3); font-size:var(--text-sm);">
                                                    <div style="flex:1; min-width:0;">
                                                        <div style="display:flex; justify-content:space-between; margin-bottom:2px;">
                                                            <span x-text="item.category"></span>
                                                            <span style="font-weight:var(--font-semibold);" x-text="'$' + item.amount.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})"></span>
                                                        </div>
                                                        <div style="height:6px; background:var(--bg-muted); border-radius:3px; overflow:hidden;">
                                                            <div style="height:100%; border-radius:3px; background:var(--color-primary-500);" :style="'width:' + Math.min(100, (item.amount / dashboardBudget.spent * 100)) + '%'"></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template x-if="!dashboardBudget.breakdown || dashboardBudget.breakdown.length === 0">
                                        <p style="font-size:var(--text-sm); color:var(--text-muted);">No spending breakdown available.</p>
                                    </template>
                                    <template x-if="canViewReports">
                                        <div style="margin-top:var(--space-3); padding-top:var(--space-3); border-top:1px solid var(--border-light);">
                                            <button class="btn btn-ghost btn-sm" @click.stop="switchView('reports')" style="width:100%;">
                                                <i class="fas fa-chart-bar"></i> View Full Reports
                                            </button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- Pending Approvals / Approver Info -->
                        <template x-if="isAdmin && dashboardApproverInfo">
                            <div class="card" style="padding: var(--space-5);">
                                <div class="flex justify-between items-center" style="margin-bottom: var(--space-4);">
                                    <h2 style="font-size: var(--text-lg); margin: 0;">Approval Queue</h2>
                                    <button class="btn btn-ghost btn-sm" @click="switchView('approvals')">View All</button>
                                </div>
                                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); text-align: center;">
                                    <div class="dash-approval-stat">
                                        <div class="dash-approval-stat-value" x-text="dashboardPendingApprovals.count">0</div>
                                        <div class="dash-approval-stat-label">Pending</div>
                                    </div>
                                    <div class="dash-approval-stat">
                                        <div class="dash-approval-stat-value" style="color: var(--color-accent-500);" x-text="dashboardPendingApprovals.urgent">0</div>
                                        <div class="dash-approval-stat-label">Urgent</div>
                                    </div>
                                    <div class="dash-approval-stat">
                                        <div class="dash-approval-stat-value" x-text="dashboardPendingApprovals.oldest_days > 0 ? dashboardPendingApprovals.oldest_days + 'd' : '-'">-</div>
                                        <div class="dash-approval-stat-label">Oldest</div>
                                    </div>
                                </div>
                                <template x-if="dashboardPendingApprovals.urgent > 0">
                                    <div style="margin-top: var(--space-4); padding: var(--space-3); background: var(--color-accent-50); border-radius: var(--radius-md); font-size: var(--text-sm); color: var(--color-accent-700);">
                                        <i class="fas fa-exclamation-triangle" style="margin-right: var(--space-2);"></i>
                                        <span x-text="dashboardPendingApprovals.urgent + ' requisition' + (dashboardPendingApprovals.urgent !== 1 ? 's' : '') + ' waiting ' + dashboardPendingApprovals.oldest_days + '+ days'"></span>
                                    </div>
                                </template>
                                <div style="margin-top: var(--space-4); font-size: var(--text-xs); color: var(--text-muted);">
                                    <i class="fas fa-shield-alt" style="margin-right: var(--space-1);"></i>
                                    Approval Level <span x-text="dashboardApproverInfo.level"></span>
                                </div>
                            </div>
                        </template>

                        <!-- My Orders card (always visible) -->
                        <div class="card" style="padding: var(--space-5);">
                            <div class="flex justify-between items-center" style="margin-bottom: var(--space-4);">
                                <h2 style="font-size: var(--text-lg); margin: 0;">My Orders</h2>
                                <button class="btn btn-ghost btn-sm" @click="switchView('orders')">View All</button>
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-3);">
                                <div class="dash-order-stat">
                                    <div style="font-size: var(--text-2xl); font-weight: var(--font-bold);" x-text="dashboardOrderCounts.draft || 0"></div>
                                    <div style="font-size: var(--text-xs); color: var(--text-muted);">Drafts</div>
                                </div>
                                <div class="dash-order-stat">
                                    <div style="font-size: var(--text-2xl); font-weight: var(--font-bold);" x-text="dashboardOrderCounts.submitted || 0"></div>
                                    <div style="font-size: var(--text-xs); color: var(--text-muted);">Submitted</div>
                                </div>
                                <div class="dash-order-stat">
                                    <div style="font-size: var(--text-2xl); font-weight: var(--font-bold);" x-text="dashboardOrderCounts.pending_approval || 0"></div>
                                    <div style="font-size: var(--text-xs); color: var(--text-muted);">Pending</div>
                                </div>
                                <div class="dash-order-stat">
                                    <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-success-600);" x-text="dashboardOrderCounts.approved || 0"></div>
                                    <div style="font-size: var(--text-xs); color: var(--text-muted);">Approved</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ===== Department Budget Card ===== -->
                    <template x-if="dashboardDeptBudget">
                        <div class="card mb-6" style="padding: var(--space-5);">
                            <div class="flex justify-between items-center" style="margin-bottom: var(--space-4);">
                                <h2 style="font-size: var(--text-lg); margin: 0;">
                                    <i class="fas fa-building" style="margin-right: var(--space-2); color: var(--text-muted);"></i>
                                    <span x-text="dashboardDeptBudget.name + ' Department Budget'"></span>
                                </h2>
                                <span class="badge" :class="{
                                    'badge-success': deptBudgetStatusLabel() === 'Healthy' || deptBudgetStatusLabel() === 'On Track',
                                    'badge-warning': deptBudgetStatusLabel() === 'Warning',
                                    'badge-accent': deptBudgetStatusLabel() === 'Critical'
                                }" x-text="deptBudgetStatusLabel()"></span>
                            </div>
                            <!-- Progress bar -->
                            <div class="dash-budget-bar-track">
                                <div class="dash-budget-bar-fill" :style="'width:' + Math.min(dashboardDeptBudget.percent, 100) + '%; background:' + deptBudgetBarColor()"></div>
                            </div>
                            <div class="flex justify-between" style="font-size: var(--text-xs); color: var(--text-muted); margin-top: var(--space-2);">
                                <span x-text="'$' + dashboardDeptBudget.spent.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0}) + ' spent'"></span>
                                <span x-text="dashboardDeptBudget.percent + '% used'"></span>
                            </div>
                            <!-- Budget numbers -->
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); margin-top: var(--space-4);">
                                <div>
                                    <div style="font-size: var(--text-xs); color: var(--text-muted);">Department Budget</div>
                                    <div style="font-weight: var(--font-bold); font-size: var(--text-base);" x-text="'$' + dashboardDeptBudget.budget.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})"></div>
                                </div>
                                <div>
                                    <div style="font-size: var(--text-xs); color: var(--text-muted);">Dept. Spent</div>
                                    <div style="font-weight: var(--font-bold); font-size: var(--text-base);" x-text="'$' + dashboardDeptBudget.spent.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})"></div>
                                </div>
                                <div>
                                    <div style="font-size: var(--text-xs); color: var(--text-muted);">Dept. Remaining</div>
                                    <div style="font-weight: var(--font-bold); font-size: var(--text-base); color: var(--color-success-600);" x-text="'$' + dashboardDeptBudget.remaining.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})"></div>
                                </div>
                            </div>
                        </div>
                    </template>


                    <!-- ===== Recent Activity ===== -->
                    <template x-if="dashboardRecentActivity.length > 0">
                        <div class="card mb-6" style="padding: var(--space-5);">
                            <div class="flex justify-between items-center" style="margin-bottom: var(--space-4);">
                                <h2 style="font-size: var(--text-lg); margin: 0;">
                                    <i class="fas fa-history" style="margin-right: var(--space-2); color: var(--text-muted);"></i>
                                    Recent Activity
                                </h2>
                                <button class="btn btn-ghost btn-sm" @click="switchView('orders')">View All</button>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: var(--space-2);">
                                <template x-for="(act, ai) in dashboardRecentActivity" :key="ai">
                                    <div style="display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3); background: var(--bg-subtle); border-radius: var(--radius-md);">
                                        <i :class="activityStatusIcon(act.status)" :style="'color:' + activityStatusColor(act.status) + ';font-size:var(--text-lg);flex-shrink:0;width:20px;text-align:center;'"></i>
                                        <div style="flex: 1; min-width: 0;">
                                            <div style="font-weight: var(--font-medium); font-size: var(--text-sm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" x-text="act.name"></div>
                                            <div style="font-size: var(--text-xs); color: var(--text-muted);">
                                                <span x-text="act.status"></span>
                                            </div>
                                        </div>
                                        <div style="font-size: var(--text-xs); color: var(--text-muted); white-space: nowrap; flex-shrink: 0;" x-text="act.time_label"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- ===== Quick Actions ===== -->
                    <div class="mb-6">
                        <h2 style="font-size: var(--text-lg); margin-bottom: var(--space-3);">Quick Actions</h2>
                        <div class="flex gap-3" style="flex-wrap: wrap;">
                            <button class="btn btn-primary" @click="switchView('browse')">
                                <i class="fas fa-store"></i> Browse Products
                            </button>
                            <button class="btn btn-ghost" @click="switchView('orders')">
                                <i class="fas fa-clipboard-list"></i> View Orders
                            </button>
                            <button class="btn btn-ghost" @click="switchView('templates')">
                                <i class="fas fa-copy"></i> Template Orders
                            </button>
                            <template x-if="savedLists.length > 0">
                                <button class="btn btn-ghost" @click="switchView('savedLists')">
                                    <i class="fas fa-bookmark"></i> Saved Lists
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Recently Viewed -->
                    <template x-if="recentlyViewed.length > 0">
                        <div class="mb-6">
                            <h2 style="font-size: var(--text-lg); margin-bottom: var(--space-3);">Recently Viewed</h2>
                            <div class="recently-viewed">
                                <template x-for="item in recentlyViewed" :key="item.ItemNumber || item.item_number">
                                    <a :href="getProductUrl(item)" class="recently-viewed-item" style="cursor:pointer; text-decoration:none; color:inherit;">
                                        <div style="font-size: 1.5rem; color: var(--color-neutral-300); margin-bottom: var(--space-2);">
                                            <i class="fas fa-box"></i>
                                        </div>
                                        <div style="font-size: var(--text-xs); font-weight: var(--font-medium);" class="truncate" x-text="(item.name || item.description || item.Description || 'Product').substring(0, 30)"></div>
                                        <div style="font-size: var(--text-xs); color: var(--color-primary-500); font-weight: var(--font-bold);" x-text="formatPrice(item.Price || item.price || item.UnitPrice)"></div>
                                    </a>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Featured Products -->
                    <template x-if="products.length > 0">
                        <div>
                            <div class="flex justify-between items-center mb-4">
                                <h2 style="font-size: var(--text-lg);">Featured Products</h2>
                                <button class="btn btn-ghost btn-sm" @click="switchView('browse')">Browse All <i class="fas fa-arrow-right" style="margin-left:4px;font-size:var(--text-xs);"></i></button>
                            </div>
                            <div class="products-grid">
                                <template x-for="product in products.slice(0, 5)" :key="product.ItemNumber || product.item_number || product.id">
                                    <div class="product-card">
                                        <div class="product-card-image" style="cursor:pointer;" @click="openProductModal(product)">
                                            <i class="fas" :class="getCategoryIcon(product)" :style="'font-size: 2.5rem; color: ' + getCategoryColor(product)"></i>
                                            <div class="product-card-actions" @click.stop>
                                                <button class="btn btn-ghost btn-icon btn-sm" @click="openProductModal(product)" title="Quick View">
                                                    <i class="fas fa-eye"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="product-card-body">
                                            <div class="product-card-vendor" x-text="product.VendorName || ''"></div>
                                            <div class="product-card-name" style="cursor:pointer;" @click="openProductModal(product)" x-text="product.Description || product.description || product.name || 'Product'"></div>
                                            <div class="product-card-meta" x-text="'#' + (product.ItemNumber || product.item_number || '')"></div>
                                        </div>
                                        <div class="product-card-footer">
                                            <div class="product-card-price" x-text="formatPrice(product.Price || product.price || product.UnitPrice)"></div>
                                            <button class="btn btn-primary btn-sm" @click="addToCart(product)">
                                                <i class="fas fa-plus"></i> Add
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- =============== BROWSE PRODUCTS VIEW =============== -->
            <template x-if="ready && activeView === 'browse'">
                <div>
                    <!-- Browse Header -->
                    <div class="flex justify-between items-center mb-4" style="flex-wrap: wrap; gap: var(--space-3);">
                        <div>
                            <h1 style="font-size: var(--text-2xl);">Browse Products</h1>
                            <p style="color: var(--text-secondary); font-size: var(--text-sm);" x-text="browseTotal + ' products available'"></p>
                        </div>
                        <div class="flex items-center gap-3">
                            <!-- View toggle -->
                            <div class="view-toggle">
                                <button class="view-toggle-btn" :class="{ active: browseViewMode === 'grid' }" @click="browseViewMode = 'grid'" title="Grid View">
                                    <i class="fas fa-th-large"></i>
                                </button>
                                <button class="view-toggle-btn" :class="{ active: browseViewMode === 'list' }" @click="browseViewMode = 'list'" title="List View">
                                    <i class="fas fa-list"></i>
                                </button>
                            </div>
                            <!-- Sort -->
                            <select class="input" style="width: auto; min-width: 160px;" x-model="browseSortBy" @change="fetchBrowseProducts()">
                                <option value="name">Name A-Z</option>
                                <option value="name_desc">Name Z-A</option>
                                <option value="price_asc">Price Low-High</option>
                                <option value="price_desc">Price High-Low</option>
                            </select>
                        </div>
                    </div>

                    <!-- Search + Filter Bar -->
                    <div class="card mb-4" style="padding: var(--space-3) var(--space-4);">
                        <div class="flex gap-3" style="flex-wrap: wrap; align-items: center;">
                            <!-- Search -->
                            <div class="input-icon-wrapper" style="flex: 1; min-width: 200px; position: relative;" @click.outside="showBrowseAutocomplete = false">
                                <i class="fas fa-search input-icon"></i>
                                <input type="text" class="input" placeholder="Search for supplies..."
                                       x-model="browseQuery"
                                       @input="browseAutocomplete()"
                                       @keydown.enter="browseSearchSubmit()"
                                       @keydown.escape="showBrowseAutocomplete = false"
                                       role="combobox"
                                       aria-autocomplete="list"
                                       aria-controls="browse-autocomplete-list"
                                       :aria-expanded="showBrowseAutocomplete">
                                <!-- Autocomplete -->
                                <div id="browse-autocomplete-list" role="listbox" class="autocomplete-dropdown"
                                     x-show="showBrowseAutocomplete" x-cloak>
                                    <!-- Loading state -->
                                    <template x-if="browseAutocompleteLoading && browseAutocompleteSuggestions.length === 0">
                                        <div style="padding: var(--space-3) var(--space-4); display:flex; align-items:center; gap: var(--space-2); color: var(--text-muted); font-size: var(--text-sm);">
                                            <div class="spinner" style="width:16px;height:16px;border-width:2px;"></div>
                                            <span>Searching...</span>
                                        </div>
                                    </template>
                                    <!-- Results -->
                                    <template x-for="(s, i) in browseAutocompleteSuggestions" :key="i">
                                        <div role="option" class="autocomplete-item" style="cursor:pointer;"
                                             @click="selectBrowseAutocomplete(s)">
                                            <i class="fas fa-box" style="color:var(--text-muted);font-size:var(--text-xs); flex-shrink:0;"></i>
                                            <div style="flex:1; min-width:0;">
                                                <div style="font-weight:var(--font-medium);" x-text="s.Description || s.name || ''"></div>
                                                <div style="font-size:var(--text-xs);color:var(--text-muted);" x-text="s.VendorName || ''"></div>
                                            </div>
                                            <div style="font-size:var(--text-xs); font-weight:var(--font-bold); color:var(--color-primary-500); flex-shrink:0; white-space:nowrap;"
                                                 x-text="s.Price ? formatPrice(s.Price) : ''"></div>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <!-- Purchasing program dropdown -->
                            <select class="input" style="width: auto; min-width: 160px;" x-model="browseBidId" @change="browseApplyFilters()"
                                    title="Filter by district purchasing program — items from approved contracts with pre-negotiated pricing">
                                <option value="">All Programs</option>
                                <template x-for="bid in availableBids" :key="bid.bid_id">
                                    <option :value="bid.bid_id" x-text="bid.bid_name + ' (' + bid.product_count + ')'"></option>
                                </template>
                            </select>

                            <!-- Category dropdown -->
                            <select class="input" style="width: auto; min-width: 160px;" x-model="browseCategory" @change="browseApplyFilters()"
                                    title="Filter by product type (e.g. Art Supplies, Science Equipment, Office Supplies)">
                                <option value="">All Categories</option>
                                <template x-for="cat in categories" :key="cat.id || cat.name">
                                    <option :value="cat.name" x-text="cat.name + (cat.product_count ? ' (' + cat.product_count + ')' : '')"></option>
                                </template>
                            </select>

                            <!-- Supplier dropdown -->
                            <select class="input" style="width: auto; min-width: 160px;" x-model="browseVendor" @change="browseApplyFilters()"
                                    title="Filter by supplier company (e.g. School Specialty, Lakeshore Learning)">
                                <option value="">All Suppliers</option>
                                <template x-for="v in filteredVendorList" :key="v.id || v.name">
                                    <option :value="v.name" x-text="v.name + (v.product_count ? ' (' + v.product_count + ')' : '')"></option>
                                </template>
                            </select>

                            <!-- Price range -->
                            <div class="flex items-center gap-2" title="Set a minimum and/or maximum price to narrow results">
                                <input type="number" class="input" style="width: 80px;" placeholder="Min $" x-model="browseMinPrice" @change="browseApplyFilters()">
                                <span style="color: var(--text-muted);">-</span>
                                <input type="number" class="input" style="width: 80px;" placeholder="Max $" x-model="browseMaxPrice" @change="browseApplyFilters()">
                            </div>
                        </div>

                        <!-- Active filters -->
                        <template x-if="browseActiveFilters.length > 0">
                            <div class="flex gap-2 mt-2" style="flex-wrap: wrap; align-items: center;">
                                <template x-for="f in browseActiveFilters" :key="f.key">
                                    <div class="filter-tag" @click="browseRemoveFilter(f.key)">
                                        <span x-text="f.label"></span>
                                        <i class="fas fa-times remove"></i>
                                    </div>
                                </template>
                                <button class="btn btn-ghost btn-sm" @click="browseClearFilters()" style="font-size: var(--text-xs);">Clear All</button>
                            </div>
                        </template>
                    </div>

                    <!-- Loading -->
                    <div x-show="browseLoading">
                        <div class="products-grid">
                            <template x-for="i in 6" :key="i">
                                <div class="product-card">
                                    <div class="skeleton" style="height: 180px;"></div>
                                    <div style="padding: var(--space-4);">
                                        <div class="skeleton" style="height: 12px; width: 60%; margin-bottom: var(--space-2);"></div>
                                        <div class="skeleton" style="height: 14px; width: 90%; margin-bottom: var(--space-2);"></div>
                                        <div class="skeleton" style="height: 12px; width: 40%;"></div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Products Grid View -->
                    <div x-show="!browseLoading && browseViewMode === 'grid'">
                        <div>
                            <div class="products-grid" x-show="browseProducts.length > 0">
                                <template x-for="(product, idx) in browseProducts" :key="(product.id || product.ItemNumber || idx) + '-' + idx">
                                    <div class="product-card">
                                        <div class="product-card-image" style="cursor:pointer;" @click="openProductModal(product)">
                                            <template x-if="product.image">
                                                <img :src="product.image" :alt="product.name || ''" style="max-width:100%; max-height:100%; object-fit:contain;" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                            </template>
                                            <i class="fas" :class="getCategoryIcon(product)" :style="'font-size: 2.5rem; color: ' + getCategoryColor(product) + (product.image ? '; display:none' : '')"></i>
                                            <div class="product-card-actions" @click.stop>
                                                <button class="btn btn-ghost btn-icon btn-sm" @click="openProductModal(product)" title="Quick View">
                                                    <i class="fas fa-eye"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="product-card-body">
                                            <div class="product-card-vendor" x-text="product.VendorName || ''"></div>
                                            <div class="product-card-name" style="cursor:pointer;" @click="openProductModal(product)" x-text="product.name || product.Description || 'Product'"></div>
                                            <div class="product-card-meta" x-show="product.description" style="font-size:var(--text-xs); color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">
                                                <span x-text="product.description"></span>
                                            </div>
                                            <div class="product-card-meta">
                                                <span x-text="'#' + (product.ItemNumber || product.item_number || '')"></span>
                                            </div>
                                        </div>
                                        <div class="product-card-footer">
                                            <div class="product-card-price" x-text="formatPrice(product.Price || product.price || product.UnitPrice)"></div>
                                            <button class="btn btn-primary btn-sm" @click="addToCart(product)">
                                                <i class="fas fa-plus"></i> Add
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Empty state -->
                            <div x-show="browseProducts.length === 0" class="empty-state">
                                <div class="empty-state-icon"><i class="fas fa-search"></i></div>
                                <div class="empty-state-title">No products found</div>
                                <p>Try adjusting your filters or search terms</p>
                                <button class="btn btn-primary mt-4" @click="browseClearFilters()">Clear Filters</button>
                            </div>
                        </div>
                    </div>

                    <!-- Products List View -->
                    <div x-show="!browseLoading && browseViewMode === 'list'">
                        <div>
                            <div class="products-list" x-show="browseProducts.length > 0">
                                <template x-for="(product, idx) in browseProducts" :key="(product.id || product.ItemNumber || idx) + '-' + idx">
                                    <div class="product-list-item">
                                        <div class="product-image" style="cursor:pointer; display:flex; align-items:center; justify-content:center;" @click="openProductModal(product)">
                                            <template x-if="product.image">
                                                <img :src="product.image" :alt="product.name || ''" style="max-width:48px; max-height:48px; object-fit:contain;" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                            </template>
                                            <i class="fas" :class="getCategoryIcon(product)" :style="'font-size: 1.5rem; color: ' + getCategoryColor(product) + (product.image ? '; display:none' : '')"></i>
                                        </div>
                                        <div class="product-info">
                                            <div style="font-size: var(--text-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;" x-text="product.VendorName || ''"></div>
                                            <div style="font-weight: var(--font-semibold); cursor:pointer;" @click="openProductModal(product)" x-text="product.name || product.Description || 'Product'"></div>
                                            <div x-show="product.description" style="font-size: var(--text-xs); color: var(--text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:500px;" x-text="product.description"></div>
                                            <div style="font-size: var(--text-xs); color: var(--text-muted);">
                                                <span x-text="'#' + (product.ItemNumber || product.item_number || '')"></span>
                                            </div>
                                        </div>
                                        <div class="product-actions">
                                            <div style="font-size: var(--text-lg); font-weight: var(--font-bold); color: var(--color-primary-500);" x-text="formatPrice(product.Price || product.price || product.UnitPrice)"></div>
                                            <button class="btn btn-primary btn-sm" @click="addToCart(product)">
                                                <i class="fas fa-plus"></i> Add
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <template x-if="!browseLoading && browseTotalPages > 1">
                        <div class="pagination mt-6">
                            <button class="pagination-btn" :disabled="browsePage <= 1" @click="browseGoToPage(browsePage - 1)">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <template x-for="(page, idx) in browsePageNumbers" :key="'p'+page">
                                <div style="display:contents;">
                                    <template x-if="idx > 0 && page - browsePageNumbers[idx-1] > 1">
                                        <span class="pagination-ellipsis">&hellip;</span>
                                    </template>
                                    <button class="pagination-btn" :class="{ active: page === browsePage }" @click="browseGoToPage(page)" x-text="page"></button>
                                </div>
                            </template>
                            <button class="pagination-btn" :disabled="browsePage >= browseTotalPages" @click="browseGoToPage(browsePage + 1)">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </template>

                    <!-- Load More button -->
                    <template x-if="!browseLoading && browsePage < browseTotalPages">
                        <div style="text-align:center;margin-top:var(--space-4);">
                            <button class="btn btn-ghost" @click="browseLoadMore()" :disabled="browseLoadingMore"
                                    style="min-width:200px;">
                                <template x-if="browseLoadingMore">
                                    <span><i class="fas fa-spinner fa-spin" style="margin-right:var(--space-2);"></i> Loading...</span>
                                </template>
                                <template x-if="!browseLoadingMore">
                                    <span><i class="fas fa-plus" style="margin-right:var(--space-2);"></i> Load More Products</span>
                                </template>
                            </button>
                            <div style="font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-2);"
                                 x-text="'Showing ' + browseProducts.length + ' of ' + Number(browseTotal || 0).toLocaleString() + ' products'"></div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- =============== ORDERS VIEW (consolidated active + pending) =============== -->
            <template x-if="ready && activeView === 'orders'">
                <div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-4);">
                        <h1 style="font-size: var(--text-2xl); margin:0;">My Orders</h1>
                        <button class="btn btn-ghost btn-sm" @click="fetchOrders()" :disabled="ordersLoading">
                            <i class="fas" :class="ordersLoading ? 'fa-spinner fa-spin' : 'fa-sync-alt'" style="margin-right:var(--space-2);"></i>
                            Refresh
                        </button>
                    </div>
                    <div class="tabs mb-4" role="tablist">
                        <button class="tab" role="tab" :aria-selected="ordersTab === 'all'" :class="{ active: ordersTab === 'all' }" @click="ordersTab = 'all'">
                            All Orders
                            <span x-show="orders.length > 0" class="badge badge-neutral" style="margin-left:var(--space-1);font-size:var(--text-xs);" x-text="orders.length"></span>
                        </button>
                        <button class="tab" role="tab" :aria-selected="ordersTab === 'active'" :class="{ active: ordersTab === 'active' }" @click="ordersTab = 'active'">Active</button>
                        <button class="tab" role="tab" :aria-selected="ordersTab === 'pending'" :class="{ active: ordersTab === 'pending' }" @click="ordersTab = 'pending'">Pending</button>
                        <button class="tab" role="tab" :aria-selected="ordersTab === 'completed'" :class="{ active: ordersTab === 'completed' }" @click="ordersTab = 'completed'">Completed</button>
                    </div>

                    <!-- Loading state -->
                    <template x-if="ordersLoading && orders.length === 0">
                        <div class="card" style="padding:var(--space-8);text-align:center;">
                            <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--eds-primary);margin-bottom:var(--space-4);"></i>
                            <p style="color:var(--text-muted);">Loading orders...</p>
                        </div>
                    </template>

                    <!-- Empty state -->
                    <template x-if="!ordersLoading && orders.length === 0">
                        <div class="card" style="padding:var(--space-8);text-align:center;">
                            <div style="font-size:3rem;color:var(--text-muted);margin-bottom:var(--space-4);"><i class="fas fa-inbox"></i></div>
                            <h3 style="margin-bottom:var(--space-2);color:var(--text-primary);">No Orders Yet</h3>
                            <p style="color:var(--text-muted);margin-bottom:var(--space-4);">Orders you submit will appear here. Browse products to get started.</p>
                            <button class="btn btn-primary" @click="switchView('browse')">
                                <i class="fas fa-shopping-bag" style="margin-right:var(--space-2);"></i> Browse Products
                            </button>
                        </div>
                    </template>

                    <!-- Orders table -->
                    <template x-if="!ordersLoading && orders.length > 0">
                        <div class="card">
                            <template x-if="filteredOrders.length === 0">
                                <div style="padding:var(--space-6);text-align:center;color:var(--text-muted);">
                                    No orders match this filter. Try a different tab.
                                </div>
                            </template>
                            <template x-if="filteredOrders.length > 0">
                                <div class="data-table-wrapper">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>Order #</th>
                                            <th>Date</th>
                                            <th>Items</th>
                                            <th>Total</th>
                                            <th>Status</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="order in filteredOrders" :key="order.requisition_id">
                                            <tr style="cursor:pointer;" @click="openOrderDetail(order)">
                                                <td style="font-weight: var(--font-semibold);" x-text="order.requisition_number || ('#' + order.requisition_id)"></td>
                                                <td x-text="order.created_at ? new Date(order.created_at).toLocaleDateString() : '-'"></td>
                                                <td x-text="order.item_count || '-'"></td>
                                                <td style="font-weight: var(--font-semibold);" x-text="formatPrice(order.total_amount || 0)"></td>
                                                <td>
                                                    <span class="badge"
                                                          :class="{
                                                              'badge-success': order.status === 'Approved' || order.status === 'Fulfilled' || order.status === 'PO Printed',
                                                              'badge-warning': order.status === 'Submitted' || order.status === 'Pending Approval' || order.status === 'On Hold',
                                                              'badge-info': order.status === 'Draft' || order.status === 'At EDS',
                                                              'badge-accent': order.status === 'Rejected' || order.status === 'Cancelled',
                                                              'badge-neutral': !order.status
                                                          }"
                                                          x-text="order.status || 'Unknown'">
                                                    </span>
                                                </td>
                                                <td @click.stop>
                                                    <button class="btn btn-ghost btn-sm" title="Reorder these items" @click="openOrderDetail(order); $nextTick(() => reorderItems())">
                                                        <i class="fas fa-redo"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <!-- =============== TEMPLATE ORDERS VIEW =============== -->
            <template x-if="ready && activeView === 'templates'">

                    <div class="flex justify-between items-center mb-2" style="flex-wrap:wrap; gap:var(--space-3);">

                        <button class="btn btn-secondary btn-sm" @click="showSaveTemplateDialog = true" :disabled="cart.length === 0"
