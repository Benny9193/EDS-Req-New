# EDS Universal Requisition - Test Workflow
# Runs on every push and pull request

name: Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, develop]

jobs:
  # ===========================================
  # Lint and Type Check
  # ===========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff linter
        run: ruff check api/ --output-format=github
        continue-on-error: true

      - name: Run type checking
        run: mypy api/ --ignore-missing-imports
        continue-on-error: true

  # ===========================================
  # Unit and API Tests
  # ===========================================
  test:
    name: Unit & API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,api]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -m "not e2e and not integration" \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ===========================================
  # Frontend Checks
  # ===========================================
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          # Basic HTML validation
          for file in frontend/*.html; do
            echo "Checking $file..."
            # Check for basic HTML structure
            grep -q '<!DOCTYPE html>' "$file" || echo "Warning: Missing DOCTYPE in $file"
            grep -q '<html' "$file" || echo "Warning: Missing html tag in $file"
          done

      - name: Check JavaScript syntax
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JavaScript files
        run: |
          # nullglob lets unmatched patterns expand to nothing, so optional
          # subdirectories (e.g. frontend/js/stores/) that don't exist yet
          # are silently skipped instead of being passed to node as a literal.
          shopt -s nullglob
          for file in frontend/js/*.js frontend/js/stores/*.js; do
            echo "Checking $file..."
            node --check "$file"
          done

  # ===========================================
  # Build Docker Images
  # ===========================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: eds-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          tags: eds-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
